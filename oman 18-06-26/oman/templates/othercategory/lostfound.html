<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterForm = document.querySelector('.filter-form');
    const originalOffset = filterForm.offsetTop;
    
    window.addEventListener('scroll', function() {
        if (window.pageYOffset > originalOffset) {
            filterForm.classList.add('sticky');
        } else {
            filterForm.classList.remove('sticky');
        }
    });
});
</script>

                                   <script>
// Favorite toggle function
function toggleFavorite(button) {
    const icon = button.querySelector('i');
    const productId = button.getAttribute('data-product-id');
    const productType = button.getAttribute('data-product-type');
    const isAuthenticated = button.getAttribute('data-is-authenticated') === 'true';
    
    if (!isAuthenticated) {
        window.location.href = '/login/';
        return;
    }
    
    const isCurrentlyFavorite = icon.classList.contains('filled');
    const action = isCurrentlyFavorite ? 'remove' : 'add';
    
    // Toggle visual state immediately for better UX
    if (isCurrentlyFavorite) {
        icon.classList.remove('fas', 'filled');
        icon.classList.add('far');
    } else {
        icon.classList.remove('far');
        icon.classList.add('fas', 'filled');
    }

    // Update localStorage
    localStorage.setItem(`favorite_${productType}_${productId}`, !isCurrentlyFavorite);
    
    // Send AJAX request
    fetch(`/add-to-favorites/${productType}/${productId}/${action}/`, {
        method: 'GET',
        headers: { 
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCookie('csrftoken')
        },
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'error') {
            // Revert visual state if there was an error
            if (isCurrentlyFavorite) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'filled');
            } else {
                icon.classList.remove('fas', 'filled');
                icon.classList.add('far');
            }
            console.error("Error updating favorite:", data.message);
        }
    })
    .catch(error => {
        console.error("Error updating favorite:", error);
        // Revert visual state on error
        if (isCurrentlyFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas', 'filled');
        } else {
            icon.classList.remove('fas', 'filled');
            icon.classList.add('far');
        }
    });
}

// Helper function to get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Initialize favorite icons on page load
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.favorite-btn i').forEach(icon => {
        const button = icon.closest('.favorite-btn');
        const productId = button.getAttribute('data-product-id');
        const productType = button.getAttribute('data-product-type');
        
        // Check localStorage for favorite status
        const isFavorite = localStorage.getItem(`favorite_${productType}_${productId}`) === 'true';
        
        if (isFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas', 'filled');
        } else {
            icon.classList.remove('fas', 'filled');
            icon.classList.add('far');
        }
    });
});

        ? params.get('category').split(',') 
        : [];
    
    // Filter out the value being removed
    const updatedValues = currentValues.filter(v => v !== value);
    
    // Update URL params
    params.delete('category');
    if (updatedValues.length > 0) {
        params.set('category', updatedValues.join(','));
    }
    
    // Uncheck the corresponding checkbox (if exists)
    const checkbox = document.querySelector(`input[name="${key}"][value="${value}"]`);
    if (checkbox) checkbox.checked = false;
    
    // Update the display field if it exists
    const displayField = document.querySelector(`#selected-main-category`);
    if (displayField) {
        displayField.value = updatedValues.join(', ') || '';
    }
    
    // ✅ CRITICAL FIX: Update badge states with updatedValues BEFORE AJAX call
    updateBadgeStates(updatedValues);
    
    // Update URL and refresh content
    updateContent(params);
}
else if (['brand'].includes(key)) {
    // Multi-value parameters
    const currentValues = params.getAll(key).flatMap(v => v.split(','));
    const updatedValues = currentValues.filter(v => v !== value);

    params.delete(key);
    if (updatedValues.length > 0) {
        // Re-add remaining values
        updatedValues.forEach(v => params.append(key, v));
    }

    // Uncheck the corresponding checkbox (if exists)
    const checkbox = document.querySelector(`input[name="${key}"][value="${value}"]`);
    if (checkbox) checkbox.checked = false;

    // Update the display field if it exists
    const displayField = document.querySelector(`#selected-brand`);
    if (displayField) {
        displayField.value = updatedValues.join(', ') || '';
    }

    // ✅ Get ALL selected categories from URL, not just updatedValues
    const allSelected = params.get('brand')
        ? params.get('brand').split(',')
        : [];

    updateBadgeStates(allSelected);
}


else if (key === 'name') {
    // Remove specific model from URL param
    const currentModels = params.get('name')?.split(',') || [];
    const updatedModels = currentModels.filter(m => m !== value);

    if (updatedModels.length > 0) {
        params.set('name', updatedModels.join(','));
    } else {
        params.delete('name');
    }

    // Unselect the model visually
    document.querySelectorAll('.model-card').forEach(card => {
        if (card.textContent.trim() === value) {
            card.classList.remove('selected');
        }
    });

    // Remove badge immediately from DOM
    const badge = document.querySelector(
        `.remove-filter[data-key="name"][data-value="${value}"]`
    );
    if (badge) badge.parentElement.remove();
}

 else if (key === 'kilometer_range') {
    const [from, to] = value.split('-');
    params.delete('kilometers_from');
    params.delete('kilometers_to');
    const fromInput = document.querySelector('#kilometers_from');
    const toInput = document.querySelector('#kilometers_to');
    if (fromInput) fromInput.value = '';
    if (toInput) toInput.value = '';
    const displayField = document.querySelector('#selected-kilometer');
    if (displayField) displayField.value = '';
}
        else if (key === 'sort') {
            // Special case for sort
            params.delete('sort');
        }
        
        // Update the URL and refresh the content
        updateContent(params);
    }

    function updateContent(params) {
    fetch(`{% url 'lostfound' %}?${params.toString()}`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(res => res.text())
    .then(html => {
        const container = document.getElementById('lostfound-list-container');
        if (container) container.innerHTML = html;
        window.history.replaceState(null, '', `?${params.toString()}`);
        updateFilterDisplay(); // Update filter display after content loads
        
        // ✅ Update badge states after AJAX update
        const selectedCategories = params.get('category') 
            ? params.get('category').split(',') 
            : [];
        updateBadgeStates(selectedCategories);
    })
    .catch(err => console.error('Error:', err));
}
    // Event listener for removing filters
    document.body.addEventListener('click', function (e) {
        if (e.target.classList.contains('remove-filter')) {
            e.preventDefault();
            
            const key = e.target.getAttribute('data-key');
            const value = e.target.getAttribute('data-value');
            
            if (key && value) {
                handleFilterRemoval(key, value);
            }
        }
    });

    // Clear all filters
document.body.addEventListener('click', function(e) {
    if (e.target.matches('#clear-all-filters')) {
        e.preventDefault();

        // Clear all checkboxes and radios
        document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(input => {
            input.checked = false;
        });

        // Clear all input fields
        document.querySelectorAll('input[type="text"], input[type="number"]').forEach(input => {
            if (input.id !== 'search' && !input.closest('.filter-modal')) {
                input.value = '';
            }
        });

        // Clear all hidden/selected fields
        const filterFields = [
            '#selected-price', '#selected-brand', '#selected-usage',
            '#selected-governate', '#selected-district', '#selected-city',
            '#selected-all-filters', '#selected-additional-filters',
            '#selected-listing-type', '#selected-category', '#selected-age', '#selected-subcategory'
        ];
        filterFields.forEach(id => {
            const el = document.querySelector(id);
            if (el) el.value = '';
        });

        // Reset brand and model selections
        document.querySelectorAll('.brand-card.selected, .model-card.selected').forEach(el => {
            el.classList.remove('selected');
        });
        
        // Show brand grid and hide models container
        const brandGrid = document.getElementById('brandGrid');
        const modelsContainer = document.getElementById('modelsContainer');
        if (brandGrid) brandGrid.style.display = 'grid';
        if (modelsContainer) modelsContainer.style.display = 'none';
// Clear all URL params
const url = new URL(window.location.href);
url.search = ''; // wipe everything

// Update the browser URL without reloading
window.history.replaceState({}, document.title, url);

        fetch(url.toString(), { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(res => res.text())
            .then(html => {
                const container = document.querySelector('#lostfound-list-container');
                if (container) container.innerHTML = html;
                history.pushState(null, '', url.toString());
                updateFilterDisplay();
            })
            .catch(err => console.error('Error:', err));
    }
});


    // Initial load
    updateFilterDisplay();
});
</script>
