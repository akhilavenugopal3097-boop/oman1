<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment & Monetization - {% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-active {
            background: rgba(255, 255, 255, 0.15);
            border-left: 4px solid #F9AD1F;
        }
        .hover-scale {
            transition: transform 0.2s;
        }
        .hover-scale:hover {
            transform: scale(1.02);
        }
        .gradient-bg {
            background: linear-gradient(60deg, #F9AD1F, #EB362D);
        }
        .gradient-text {
            background: linear-gradient(60deg, #F9AD1F, #EB362D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-gradient {
            background: linear-gradient(60deg, #F9AD1F, #EB362D);
            transition: opacity 0.2s;
        }
        .btn-gradient:hover {
            opacity: 0.9;
        }
        .currency-symbol {
            color: #F9AD1F;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen bg-gray-100">
        <!-- Sidebar with solid color - Teal #15818E -->
        <div class="w-72" style="background-color: #15818E;" class="text-white shadow-xl">
            <div class="p-6 border-b" style="border-color: rgba(255,255,255,0.2);">
                <h2 class="text-2xl font-bold flex items-center">
                    <i class="fas fa-credit-card mr-3" style="color: #F9AD1F;"></i>
                    <span class="text-white">PayFlow Admin</span>
                </h2>
                <p class="text-white/70 text-sm mt-1">Payment Management System</p>
            </div>
            
            <nav class="mt-6">
                <a href="{% url 'payments_dashboard' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/' %}sidebar-active{% endif %}">
                    <i class="fas fa-chart-pie w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Dashboard</span>
                </a>
                <a href="{% url 'view_transactions' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/transactions/' %}sidebar-active{% endif %}">
                    <i class="fas fa-exchange-alt w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Transactions</span>
                </a>
                <a href="{% url 'refund_management' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/refunds/' %}sidebar-active{% endif %}">
                    <i class="fas fa-undo-alt w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Refund Management</span>
                </a>
                <a href="{% url 'subscription_plans' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/subscriptions/' %}sidebar-active{% endif %}">
                    <i class="fas fa-calendar-alt w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Subscription Plans</span>
                </a>
                <a href="{% url 'boosted_ads_pricing' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/boosted-pricing/' %}sidebar-active{% endif %}">
                    <i class="fas fa-chart-line w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Boosted Ads</span>
                </a>
                <a href="{% url 'coupon_codes' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/coupons/' %}sidebar-active{% endif %}">
                    <i class="fas fa-tags w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Coupon Codes</span>
                </a>
                <a href="{% url 'commission_management' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/commissions/' %}sidebar-active{% endif %}">
                    <i class="fas fa-percent w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Commission Management</span>
                </a>
                <a href="{% url 'invoice_generation' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/invoices/' %}sidebar-active{% endif %}">
                    <i class="fas fa-file-invoice w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Invoice Generation</span>
                </a>
                <a href="{% url 'payment_gateway_logs' %}" class="flex items-center py-3 px-6 hover:bg-white/10 transition-colors {% if request.path == '/payments/gateway-logs/' %}sidebar-active{% endif %}">
                    <i class="fas fa-history w-8 text-white/70"></i>
                    <span class="text-sm font-medium text-white/90">Gateway Logs</span>
                </a>
            </nav>

            <div class="absolute bottom-0 w-72 p-6 border-t" style="border-color: rgba(255,255,255,0.2);">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm text-white/80">
                            <a href="{% url 'admin_dashboard_overview' %}" class="ml-2 px-2 py-1 bg-white/20 rounded hover:bg-white/30 transition-colors text-xs" title="Back to Admin Dashboard">
                                <i class="fas fa-arrow-left mr-1"></i>Dashboard
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Top Bar -->
            <div class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-semibold text-gray-800">{% block page_title %}Dashboard{% endblock %}</h1>
                <div class="flex items-center space-x-4">
                    <button class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-bell text-xl"></i>
                    </button>
                    <button class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-cog text-xl"></i>
                    </button>
                    <div class="h-8 w-px bg-gray-300"></div>
                    <a href="{% url 'admin_dashboard_overview' %}" class="px-4 py-2 text-white rounded-lg transition-colors btn-gradient flex items-center">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to Dashboard
                    </a>
                </div>
            </div>

            <!-- Content Area -->
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
