{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    
    <title>Admin Login | OMAN</title>
    
    <!-- Fav Icon -->
    <link rel="icon" href="{% static 'assets/images/Zoqo-02.png' %}" type="image/x-icon">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 1.5rem;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo img {
            height: 48px;
            width: auto;
        }

        .title {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .title p {
            font-size: 0.875rem;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .form-group label i {
            color: #94a3b8;
            margin-right: 0.5rem;
            width: 16px;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            background: white;
        }

        .form-control:focus {
            outline: none;
            border-color: #F9AD1F;
            box-shadow: 0 0 0 3px rgba(249, 173, 31, 0.05);
        }

        .form-control::placeholder {
            color: #cbd5e1;
            font-weight: 300;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.2s;
            z-index: 2;
        }

        .password-toggle:hover {
            color: #F9AD1F;
        }

        .alert {
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #b91c1c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert i {
            font-size: 1rem;
            color: #ef4444;
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: #F9AD1F;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            background: #e09d1c;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #f1f5f9;
            z-index: 1;
        }

        .divider span {
            position: relative;
            z-index: 2;
            background: white;
            padding: 0 0.75rem;
            color: #94a3b8;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .subadmin-btn {
            width: 100%;
            padding: 0.875rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .subadmin-btn:hover {
            background: #f8fafc;
            border-color: #F9AD1F;
            color: #F9AD1F;
        }

        .subadmin-btn:hover i {
            color: #F9AD1F;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .footer a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .footer a:hover {
            color: #F9AD1F;
        }

        .footer i {
            font-size: 0.75rem;
        }

        /* Status Badge - matches header style */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 30px;
            background: #f8fafc;
            color: #64748b;
            border: 1px solid #f1f5f9;
        }

        /* Loading spinner */
        .fa-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            
            <!-- Logo -->
            <div class="logo">
                <img src="{% static 'assets/images/Zoqo-01.png' %}" alt="OMAN">
            </div>
            
            <!-- Title -->
            <div class="title">
                <h2>Admin</h2>
                <p>Sign in to access the dashboard</p>
            </div>
            
            <!-- Admin Login Form -->
            <form action="{% url 'admin' %}" method="post" id="loginForm">
                {% csrf_token %}
                
                <!-- Username -->
                <div class="form-group">
                    <label>
                        <i class="far fa-user"></i>
                        Username
                    </label>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Enter your username" required autofocus>
                </div>
                
                <!-- Password with toggle -->
                <div class="form-group">
                    <label>
                        <i class="far fa-lock"></i>
                        Password
                    </label>
                    <div class="input-wrapper">
                        <input type="password" name="password" class="form-control" id="password"
                               placeholder="••••••••" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                
                <!-- Error Messages -->
                {% if messages %}
                    {% for message in messages %}
                        {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
                            <div class="alert">
                                <i class="fas fa-exclamation-circle"></i>
                                {{ message }}
                            </div>
                        {% endif %}
                    {% endfor %}
                {% endif %}
                
                <!-- Login Button -->
                <div class="form-group">
                    <button type="submit" class="btn-login" id="loginBtn">
                        <i class="fas fa-arrow-right"></i>
                        Sign in
                    </button>
                </div>
            </form>
            
            <!-- Divider -->
            <div class="divider">
                <span>sub-admin access</span>
            </div>
            
            <!-- Sub-Admin Login -->
            <a href="{% url 'subadmin_login' %}" class="subadmin-btn">
                <i class="fas fa-user-shield"></i>
                Login as Sub-Admin
            </a>
            
            <!-- Footer -->
            <div class="footer">
                <a href="{% url 'index' %}">
                    <i class="fas fa-chevron-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Password visibility toggle
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // Toggle eye icon
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }
            
            // Form submission with loading state
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            
            if (loginForm && loginBtn) {
                loginForm.addEventListener('submit', function() {
                    loginBtn.disabled = true;
                    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                    return true;
                });
            }
            
            // Auto-hide alerts after 5 seconds
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.3s';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 300);
                }, 5000);
            });
        });
    </script>
</body>
</html>
