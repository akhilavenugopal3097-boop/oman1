<!DOCTYPE html>
{% load static %}
{% include 'header.html' %}

<!-- Google Fonts & Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    /* RESET */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        overflow: hidden;
    }

    /* HERO BACKGROUND */
    .forgot-hero {
        height: 100vh;
        background: url("{% static 'assets/images/banner/20.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin-top: 0;    
    }

    /* CONTAINER */
    .auto-container {
        max-width: 1500px;
        margin: auto;
        padding: 0 20px;
        height: 100%;
    }

    /* INNER FLEX */
    .forgot-inner {
        display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80%;
    }

    /* LEFT SECTION */
    .forgot-left {
        width: 38.5%;
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .forgot-left h1 {
        font-size: 65px;
        font-weight: 200;
        margin-bottom: 10px;
        color: white;
        font-family: 'FontStyle5', 'Inter', sans-serif;
        letter-spacing: 1px;
    }

    .forgot-left p {
        font-size: 15px;
        margin-bottom: 30px;
        color: white;
        font-family: 'FontStyle5', 'Inter', sans-serif;

    }

    /* FORM */
    .forgot-left form {
        width: 100%;
        max-width: 500px;
    }

    .forgot-left input {
        width: 100%;
        padding: 14px 18px;
        border: none;
        border-radius: 12px;
        margin-bottom: 14px;
        font-size: 13px;
        background: #f3f3f3;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: 0.2s;
    }

    .forgot-left input:focus {
        box-shadow: 0 0 0 2px rgba(0,0,0,0.1);
        background: #ffffff;
    }

    .theme-btn-one {
        width: 100%;
        padding: 10px;
        border-radius: 20px;
        background: black;
        color: white;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: 0.3s;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        margin-top: 8px;
    }

    .theme-btn-one:hover {
        transform: scale(0.96);
        background: #222;
    }

    .alert {
        padding: 12px 16px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        width: 100%;
        max-width: 500px;
    }
    .alert-danger { background: rgba(220, 53, 69, 0.9); color: white; }
    .alert-success { background: rgba(40, 167, 69, 0.9); color: white; }
    .alert-info { background: rgba(23, 162, 184, 0.85); color: white; }

    .back-login {
        margin-top: 16px;
        font-size: 13px;
        text-align: center;
        width: 100%;
    }
    .back-login a {
        color: white;
        font-weight: 700;
        text-decoration: underline;
    }

    /* RIGHT SECTION - VERTICAL SLIDER */
    .forgot-right {
        width:56%;
        display:flex;
        flex-direction:column;
        align-items:flex-end;
        gap:25px;
        position: relative;
        height: 100%;
        justify-content: center;
        margin-right: -60px;
    }

    .vertical-carousel-container {
          width: 90%;
        height: 1560px;
        position: relative;
        overflow: hidden;
      
        /* border-radius: 10px; */
        background: transparent;    
        margin-left: 15px;
    }

    .carousel-track {
        position: relative;
        width: 100%;
        display: flex;
        flex-direction: column;
        will-change: transform;
        gap: 20px;
    }

    .carousel-slide {
        width: 100%;
        height: 500px !important;
        position: relative;
        overflow: hidden;
        border-radius: 28px;
        background: #0a0a0a;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        flex-shrink: 0;
        transition: none;
        transform: none;
        cursor: pointer;
    }

    .carousel-slide video {
         width: 560px;
        height: 100%;
        object-fit: cover;
        display: block;
        border-radius: 28px;
        pointer-events: none;
        transition: none;
    }

    .slide-caption {
         position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-align: center;           /* center text horizontally */
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    z-index: 2;
    background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.4), rgba(0,0,0,0.6)); /* centered gradient look */
    padding: 8px 16px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
    font-family:'FontStyle6';
    letter-spacing: 0.3px;
    pointer-events: none;
    }

    .carousel-slide.paused-highlight {
        /* box-shadow: 0 0 0 3px rgba(255,215,0,0.6), 0 20px 40px rgba(0,0,0,0.4); */
        transition: box-shadow 0.2s ease;
    }

    @media(max-width: 950px) {
        .forgot-inner {
            flex-direction: column;
            justify-content: center;
            padding: 40px 0;
        }
        .forgot-left {
            width: 100%;
            margin-top: 20px;
        }
        .forgot-right {
            display: none;
        }
        .forgot-hero {
            height: auto;
            min-height: 100vh;
            padding: 40px 0;
        }
    }

    .carousel-track {
        will-change: transform;
        backface-visibility: hidden;
        transform: translateZ(0);
    }
    .carousel-slide video {
        backface-visibility: hidden;
    }
    /* ========== RESPONSIVE FOR FORGOT PASSWORD (Carousel below form on mobile) ========== */
@media (max-width: 950px) {
    /* Fix container overflow */
    body, .forgot-hero, .auto-container {
        overflow-x: hidden;
        width: 100%;
    }

    .forgot-hero {
        height: auto;
        min-height: 100vh;
        background-position: center top;
        overflow-y: auto;
        padding: 40px 0;
    }

    .auto-container {
        padding: 0 16px;
        height: auto;
    }

    /* Stack layout vertically */
    .forgot-inner {
        flex-direction: column;
        justify-content: flex-start;
        height: auto;
        gap: 30px;
        padding: 0;
    }

    /* Form appears first */
    .forgot-left {
        width: 100%;
        order: 1;
        padding: 0;
    }

    /* Carousel appears below the form */
    .forgot-right {
        display: flex !important;
        width: 100%;
        margin-right: 0;
        order: 2;
        align-items: center;
        justify-content: center;
        height: auto;
    }

    /* Reduced height for carousel container on mobile */
    .vertical-carousel-container {
        width: 100%;
        height: 400px;          /* Reduced height for tablets */
        margin-left: 0;
        margin-top: 0;
        margin-bottom: 20px;
    }

    /* Adjust slide height dynamically */
    .carousel-slide {
        height: auto !important;
    }

    /* Make videos fill slides properly */
    .carousel-slide video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Adjust form heading and text sizes */
    .forgot-left h1 {
        font-size: 42px;
        margin-bottom: 8px;
    }

    .forgot-left p {
        font-size: 13px;
        margin-bottom: 20px;
    }

    /* Form inputs full width */
    .forgot-left input {
        font-size: 14px;
        padding: 12px 16px;
    }

    .theme-btn-one {
        padding: 12px;
        font-size: 14px;
    }

    /* Alert messages */
    .alert {
        font-size: 12px;
        padding: 10px 12px;
        margin-bottom: 18px;
        max-width: 100%;
    }

    /* Back link */
    .back-login {
        font-size: 12px;
        margin-top: 20px;
    }
}

/* Extra small devices (phones under 480px) - further reduce height */
@media (max-width: 480px) {
    .vertical-carousel-container {
        height: 320px;          /* Smaller for narrow screens */
    }

    .forgot-left h1 {
        font-size: 32px;
    }

    .forgot-left p {
        font-size: 11px;
    }

    .forgot-left input {
        padding: 10px 14px;
        font-size: 13px;
    }

    .theme-btn-one {
        padding: 10px;
        font-size: 13px;
    }

    .alert {
        font-size: 11px;
        padding: 8px 10px;
    }

    .back-login {
        font-size: 11px;
    }
}

/* Landscape orientation on small devices */
@media (max-width: 850px) and (orientation: landscape) {
    .vertical-carousel-container {
        height: 280px;
    }
}
</style>

<body>
<div class="forgot-hero">
    <div class="auto-container">
        <div class="forgot-inner">

            <!-- LEFT: ACCOUNT RECOVERY FORM -->
            <div class="forgot-left">
                <h1>ACCOUNT RECOVERY</h1>
                <p>Enter your email address – we'll send your username and a password reset link.</p>

                {% if error_message %}
    <div class="alert alert-danger">
        {{ error_message }}
    </div>
{% endif %}

{% if success_message %}
    <div class="alert alert-success">
        {{ success_message }}
    </div>
{% endif %}
                <form method="post" action="{% url 'password_reset' %}">
                    {% csrf_token %}
                    <input type="email" name="email" placeholder="EMAIL ADDRESS" required 
                           pattern="[^@]+@[^@]+\.[a-zA-Z]{2,6}" title="Enter a valid email address">
                    <button type="submit" class="theme-btn-one">SEND RECOVERY EMAIL</button>
                </form>

                <div class="back-login">
                    <a href="{% url 'login' %}">← BACK TO LOGIN</a>
                </div>
            </div>

            <!-- RIGHT: VERTICAL VIDEO SLIDER -->
            <div class="forgot-right">
                <div class="vertical-carousel-container" id="verticalCarousel">
                    <div class="carousel-track" id="carouselTrack"></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
// ============================================================
// VERTICAL CAROUSEL – EASING (SLOW DOWN AT CENTER, NO PAUSE)
// ============================================================

const originalSlidesData = [
    {
        videoSrc: "{% static 'assets/images/video/6.mp4' %}",
        caption: "THE ULTIMATE MARKETPLACE FOR MOTORS"
    },
    {
        videoSrc: "{% static 'assets/images/video/2.mp4' %}",
        caption: "CONNECTING SELLERS AND BUYERS ACROSS THE OMAN"
    },
    {
        videoSrc: "{% static 'assets/images/video/1.mp4' %}",
        caption: "EXPERIENCE THE SMARTEST WAY TO TRADE IN OMAN"
    },
    {
        videoSrc: "{% static 'assets/images/video/3.mp4' %}",
        caption: "INVEST IN YOURS FAMILY'S FUTURE WITH ZOQO DEAL"
    },
    {
        videoSrc: "{% static 'assets/images/video/5.mp4' %}",
        caption: "FIND YOUR DREAM HOME IN THE HEART OF OMAN"
    },
    {
        videoSrc: "{% static 'assets/images/video/7.mp4' %}",
        caption: "YOUR NEXT DRIVE IS JUST A CLICK AWAY"
    },
    {
        videoSrc: "{% static 'assets/images/video/4.mp4' %}",
        caption: "DISCOVER EXCLUSIVE PROPERTY DEALS AT YOUR FINGERTIPS"
    }
];

// Build duplicated slides for smooth infinite loop (6 copies)
let carouselSlidesData = [];
const DUPLICATE_COUNT = 6;
for (let i = 0; i < DUPLICATE_COUNT; i++) {
    carouselSlidesData = carouselSlidesData.concat(originalSlidesData.map((slide, idx) => ({
        ...slide,
        originalIndex: idx,
        copyId: i
    })));
}

let track = document.getElementById('carouselTrack');
let container = document.getElementById('verticalCarousel');
let slideHeight = 0;
let gapSize = 20;
let totalSlides = carouselSlidesData.length;

let animationFrameId = null;
let currentTranslateY = 0;
let isAnimating = true;

// Easing parameters – faster base speed, slowdown near center
const MAX_SPEED_PX_PER_SEC = 280;   // increased from 135
const SLOWDOWN_ZONE = 120;          // start slowing within 120px from center
const MIN_SPEED_FACTOR = 0.02;      // almost stopped at exact center

let lastTimestamp = null;

// ------------------- BUILD SLIDES -------------------
function buildSlides() {
    if (!track) return;
    track.innerHTML = '';
    for (let i = 0; i < carouselSlidesData.length; i++) {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'carousel-slide';
        slideDiv.setAttribute('data-slide-index', i);
        
        const videoElem = document.createElement('video');
        videoElem.muted = true;
        videoElem.loop = true;
        videoElem.playsInline = true;
        videoElem.setAttribute('preload', 'auto');
        
        let videoPath = carouselSlidesData[i].videoSrc;
        if (videoPath.includes("{% static")) {
            const match = videoPath.match(/'([^']+)'/);
            if (match) videoPath = match[1];
            else videoPath = `/static/assets/images/video/${(i % 7) + 1}.mp4`;
        }
        videoElem.src = videoPath;
        
        videoElem.addEventListener('error', function() {
            const fallbackPath = `/static/assets/images/video/${(carouselSlidesData[i].originalIndex % 7) + 1}.mp4`;
            videoElem.src = fallbackPath;
            videoElem.load();
        });
        
        const captionDiv = document.createElement('div');
        captionDiv.className = 'slide-caption';
        captionDiv.textContent = carouselSlidesData[i].caption;
        
        slideDiv.appendChild(videoElem);
        slideDiv.appendChild(captionDiv);
        track.appendChild(slideDiv);
    }
    
    setTimeout(() => {
        updateDimensionsAndReset();
        startContinuousScroll();
        startVideoPlayback();
    }, 100);
}

// ------------------- DIMENSIONS & RESET -------------------
function updateDimensionsAndReset() {
    if (!container || !track) return;
    const containerHeight = container.clientHeight;
    if (containerHeight === 0) return;
    
    const calculatedSlideHeight = (containerHeight - (2 * gapSize)) / 2;
    if (calculatedSlideHeight <= 0) return;
    slideHeight = calculatedSlideHeight;
    
    const slides = track.querySelectorAll('.carousel-slide');
    slides.forEach(slide => { slide.style.height = `${slideHeight}px`; });
    
    const totalTrackHeight = (totalSlides * slideHeight) + ((totalSlides - 1) * gapSize);
    track.style.height = `${totalTrackHeight}px`;
    
    currentTranslateY = 0;
    applyTransform(currentTranslateY);
    isAnimating = true;
}

function applyTransform(yPos) {
    if (!track) return;
    track.style.transform = `translateY(${yPos}px) translateZ(0)`;
    track.style.willChange = 'transform';
    currentTranslateY = yPos;
}

// ------------------- EASING LOGIC (DISTANCE TO CENTER) -------------------
function getDistanceToCenter() {
    if (!track || slideHeight === 0) return null;
    const slides = track.querySelectorAll('.carousel-slide');
    if (slides.length === 0) return null;
    
    const containerRect = container.getBoundingClientRect();
    const containerCenter = containerRect.top + containerRect.height / 2;
    
    let closestDist = Infinity;
    let closestSlideCenter = null;
    for (let i = 0; i < slides.length; i++) {
        const rect = slides[i].getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist = Math.abs(slideCenter - containerCenter);
        if (dist < closestDist) {
            closestDist = dist;
            closestSlideCenter = slideCenter;
        }
    }
    if (closestSlideCenter === null) return null;
    return closestSlideCenter - containerCenter;
}

function getSpeedFactor(distance) {
    const absDist = Math.abs(distance);
    if (absDist >= SLOWDOWN_ZONE) return 1.0;
    const t = absDist / SLOWDOWN_ZONE;
    const factor = MIN_SPEED_FACTOR + t * (1 - MIN_SPEED_FACTOR);
    return Math.min(1.0, Math.max(MIN_SPEED_FACTOR, factor));
}

// ------------------- ANIMATION LOOP (SMOOTH SCROLL WITH EASING) -------------------
function startAnimationLoop() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    lastTimestamp = null;
    
    function animate(now) {
        if (!isAnimating) return;
        if (!track || slideHeight === 0) {
            animationFrameId = requestAnimationFrame(animate);
            return;
        }
        if (lastTimestamp === null) {
            lastTimestamp = now;
            animationFrameId = requestAnimationFrame(animate);
            return;
        }
        
        let delta = Math.min(100, now - lastTimestamp);
        if (delta <= 0) {
            lastTimestamp = now;
            animationFrameId = requestAnimationFrame(animate);
            return;
        }
        
        const distance = getDistanceToCenter();
        let speedFactor = 1.0;
        if (distance !== null) {
            speedFactor = getSpeedFactor(distance);
        }
        
        let moveDistance = (MAX_SPEED_PX_PER_SEC * speedFactor * delta) / 1000;
        let newY = currentTranslateY - moveDistance;
        
        const totalTrackHeight = (totalSlides * slideHeight) + ((totalSlides - 1) * gapSize);
        const containerHeight = container.clientHeight;
        const resetThreshold = -(totalTrackHeight / 2);
        if (newY <= resetThreshold) {
            newY = newY + (totalTrackHeight / 2);
            applyTransform(newY);
            lastTimestamp = now;
            animationFrameId = requestAnimationFrame(animate);
            return;
        }
        
        const maxY = 0;
        const minY = -(totalTrackHeight - containerHeight);
        newY = Math.min(maxY, Math.max(minY, newY));
        applyTransform(newY);
        
        // Highlight slide that is very close to center
        if (distance !== null && Math.abs(distance) < 10) {
            highlightNearestSlide();
        } else {
            clearHighlight();
        }
        
        lastTimestamp = now;
        animationFrameId = requestAnimationFrame(animate);
    }
    
    animationFrameId = requestAnimationFrame(animate);
}

let lastHighlighted = -1;
function highlightNearestSlide() {
    if (!track) return;
    const slides = track.querySelectorAll('.carousel-slide');
    if (slides.length === 0) return;
    const containerRect = container.getBoundingClientRect();
    const containerCenter = containerRect.top + containerRect.height / 2;
    let closestIdx = -1;
    let minDist = Infinity;
    for (let i = 0; i < slides.length; i++) {
        const rect = slides[i].getBoundingClientRect();
        const slideCenter = rect.top + rect.height / 2;
        const dist = Math.abs(slideCenter - containerCenter);
        if (dist < minDist) {
            minDist = dist;
            closestIdx = i;
        }
    }
    if (closestIdx !== -1 && closestIdx !== lastHighlighted) {
        if (lastHighlighted !== -1) slides[lastHighlighted]?.classList.remove('paused-highlight');
        slides[closestIdx].classList.add('paused-highlight');
        lastHighlighted = closestIdx;
    }
}

function clearHighlight() {
    if (!track) return;
    const slides = track.querySelectorAll('.carousel-slide');
    slides.forEach(slide => slide.classList.remove('paused-highlight'));
    lastHighlighted = -1;
}

function startContinuousScroll() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    isAnimating = true;
    lastTimestamp = null;
    startAnimationLoop();
}

// ------------------- VIDEO PLAYBACK -------------------
function startVideoPlayback() {
    if (!track) return;
    const slides = track.querySelectorAll('.carousel-slide');
    slides.forEach((slide) => {
        const video = slide.querySelector('video');
        if (video) {
            video.muted = true;
            video.loop = true;
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => setTimeout(() => video.play().catch(() => {}), 300));
            }
        }
    });
}

// ------------------- RESIZE HANDLER -------------------
let resizeTimeout;
function handleResize() {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        if (container && container.clientHeight > 0) {
            const oldTotalHeight = (totalSlides * slideHeight) + ((totalSlides - 1) * gapSize);
            const oldProgress = -currentTranslateY / oldTotalHeight;
            updateDimensionsAndReset();
            const newTotalHeight = (totalSlides * slideHeight) + ((totalSlides - 1) * gapSize);
            let newY = -oldProgress * newTotalHeight;
            const maxY = 0;
            const minY = -(newTotalHeight - container.clientHeight);
            newY = Math.min(maxY, Math.max(minY, newY));
            applyTransform(newY);
            startContinuousScroll();
            startVideoPlayback();
        }
    }, 200);
}

// ------------------- AUTOPLAY ON INTERACTION -------------------
function enableAutoplayOnInteraction() {
    startVideoPlayback();
    if (!isAnimating) startContinuousScroll();
    document.removeEventListener('click', enableAutoplayOnInteraction);
    document.removeEventListener('touchstart', enableAutoplayOnInteraction);
}

// ------------------- INITIALIZE -------------------
function initCarousel() {
    buildSlides();
    window.addEventListener('resize', handleResize);
    window.addEventListener('orientationchange', () => setTimeout(handleResize, 100));
    document.addEventListener('click', enableAutoplayOnInteraction, { once: true });
    document.addEventListener('touchstart', enableAutoplayOnInteraction, { once: true });
    setTimeout(() => startVideoPlayback(), 600);
}

// Add required styles (no transitions, only highlight shadow)
const style = document.createElement('style');
style.textContent = `
    .carousel-slide { transition: none !important; transform: none !important; }
    .carousel-track { transition: none !important; will-change: transform; }
    .paused-highlight { box-shadow: 0 25px 40px rgba(0,0,0,0.5); transition: box-shadow 0.2s; }
`;
document.head.appendChild(style);

// Start everything
initCarousel();

// ------------------- FORM FADE-IN ANIMATION (unchanged) -------------------
document.addEventListener("DOMContentLoaded", function() {
    const formElements = document.querySelectorAll('.forgot-left input, .forgot-left button');
    formElements.forEach((el, index) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        setTimeout(() => {
            el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
        }, 100 + (index * 50));
    });
});
</script>
</body>
