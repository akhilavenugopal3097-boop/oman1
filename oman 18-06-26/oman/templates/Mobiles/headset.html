document.addEventListener('DOMContentLoaded', function() {
    const filterForm = document.querySelector('.filter-form');
    const originalOffset = filterForm.offsetTop;
    
    window.addEventListener('scroll', function() {
        if (window.pageYOffset > originalOffset) {
            filterForm.classList.add('sticky');
        } else {
            filterForm.classList.remove('sticky');
        }
    });
});

            'WT': ['Haima', 'Shinas']

        citiesList.innerHTML = ''; // Clear previous cities
    
        if (region && cities[region]) {
            cities[region].forEach(function(city) {

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        let swiperInstance;

        function initializeSwiper() {
            if (swiperInstance) swiperInstance.destroy(true, true); // Properly destroy the swiper including clones

            swiperInstance = new Swiper('.dual-ad-loop-box .swiper-container', {
                slidesPerView: 2,
                spaceBetween: 6,
                loop: true,
                autoplay: {
                    delay: 3000,
                    disableOnInteraction: false,
                },
                breakpoints: {
                    320: {
                        spaceBetween: 3
                    },
                    768: {
                        spaceBetween: 6
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function () {
            initializeSwiper();
        });

        // Function to update advertisements and reinitialize Swiper
        function applyFilter(newAdsHTML) {
            const swiperWrapper = document.getElementById('ad-swiper-wrapper');

            if (swiperInstance) {
                swiperInstance.destroy(true, true); // Destroy swiper and remove loop clones
            }

            // Replace slides (newAdsHTML should be new <div class="swiper-slide">...</div> blocks)
            swiperWrapper.innerHTML = newAdsHTML;

            // Re-initialize Swiper after DOM update
            initializeSwiper();
        }
    </script>

}

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggleLocation = document.getElementById('toggle-location-filter');
  const locationContainer = document.getElementById('location-list-container');
  const locationList = document.getElementById('location-list');
  const selectAllGov = document.getElementById('select-all-governates');
  const clearBtn = document.getElementById('clear-location-filter');
  const selectedInput = document.getElementById('selected-location');
  const locationSearch = document.getElementById('location-search');

  // Store fetched data to avoid duplicate API calls
  const fetchedDistricts = new Map();
  const fetchedCities = new Map();

  // Toggle dropdown
  toggleLocation.addEventListener('click', function(e) {
    e.stopPropagation();
    const wasVisible = locationContainer.style.display === 'block';
    closeAllFilterContainers();
    locationContainer.style.display = wasVisible ? 'none' : 'block';
    
    // Focus on search when dropdown opens
    if (locationContainer.style.display === 'block') {
      setTimeout(() => {
        locationSearch.focus();
        locationSearch.select();
      }, 100);
    }
  });

  // Close when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#location-list-container') && !e.target.closest('#toggle-location-filter')) {
      locationContainer.style.display = 'none';
    }
  });

  // Search functionality - SIMPLIFIED and WORKING version
  locationSearch.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase().trim();
    performSearch(searchTerm);
  });

  // Main search function
  async function performSearch(searchTerm) {
    const allItems = locationList.querySelectorAll('.location-item, .nested-label, .label-item, .all');
    
    if (!searchTerm) {
      // Reset everything when search is cleared
      allItems.forEach(item => {
        item.classList.remove('search-hidden');
        // Reset expanded state for non-user-expanded items
        if (item.classList.contains('location-item') && !item.classList.contains('user-expanded')) {
          const nestedList = item.querySelector('.nested-list');
          const arrow = item.querySelector('.dropdown-arrow, .district-dropdown-arrow');
          if (nestedList && nestedList.children.length > 0) {
            nestedList.style.display = 'none';
            if (arrow) arrow.classList.remove('rotated');
          }
        }
      });
      return;
    }

    // First hide everything
    allItems.forEach(item => {
      item.classList.add('search-hidden');
    });

    const governateItems = locationList.querySelectorAll('.location-item[data-type="governate"]');

for (const governateItem of governateItems) {
  const governateName = governateItem.querySelector('label').textContent.toLowerCase();

  // 🔹 Always load districts first
  await expandAndLoadGovernate(governateItem, searchTerm);

  // 🔹 Now check district & city matches
  const hasMatch =
    governateName.includes(searchTerm) ||
    await checkDistrictsForMatch(governateItem, searchTerm);

  if (hasMatch) {
    governateItem.classList.remove('search-hidden');
  } else {
    governateItem.classList.add('search-hidden');
  }
}


    // Show labels if any items are visible
    const visibleItems = locationList.querySelectorAll('.location-item:not(.search-hidden)');
    if (visibleItems.length > 0) {
      document.querySelectorAll('.label-item, .all').forEach(label => {
        label.classList.remove('search-hidden');
      });
    }
  }

  // Expand and load governate data
  async function expandAndLoadGovernate(governateItem, searchTerm) {
    const nestedList = governateItem.querySelector('.nested-list');
    const arrow = governateItem.querySelector('.dropdown-arrow');
    
    // Ensure districts are loaded
    if (nestedList.children.length === 0) {
      const governateId = governateItem.dataset.id;
      await fetchDistricts(governateId, nestedList, searchTerm);
    }
    
    // Expand the governate
    nestedList.style.display = 'block';
    nestedList.classList.add('expanded');
    if (arrow) arrow.classList.add('rotated');
    
    // Apply search to loaded districts
    if (searchTerm) {
      const districtItems = nestedList.querySelectorAll('.location-item[data-type="district"]');
      districtItems.forEach(districtItem => {
        const districtName = districtItem.querySelector('label').textContent.toLowerCase();
        if (districtName.includes(searchTerm)) {
          districtItem.classList.remove('search-hidden');
        } else {
          districtItem.classList.add('search-hidden');
        }
      });
    }
  }
async function checkDistrictsForMatch(governateItem, searchTerm) {
  const nestedList = governateItem.querySelector('.nested-list');
  const districts = nestedList.querySelectorAll('.location-item[data-type="district"]');
  let hasMatch = false;

  for (const districtItem of districts) {
    const districtName = districtItem.querySelector('label').textContent.toLowerCase();
    const districtNested = districtItem.querySelector('.nested-list');
    const arrow = districtItem.querySelector('.district-dropdown-arrow');

    // Always load cities
    if (districtNested.children.length === 0) {
      await fetchCities(districtItem.dataset.id, districtNested);
    }

    const cityMatched = await checkCitiesForMatch(districtItem, searchTerm);

    if (districtName.includes(searchTerm) || cityMatched) {
      districtItem.classList.remove('search-hidden');

      // ✅ FORCE EXPAND DISTRICT
      districtNested.style.display = 'block';
      districtNested.classList.add('expanded');
      if (arrow) arrow.classList.add('rotated');

      hasMatch = true;
    } else {
      districtItem.classList.add('search-hidden');
    }
  }

  return hasMatch;
}
async function checkCitiesForMatch(districtItem, searchTerm) {
  const nestedList = districtItem.querySelector('.nested-list');
  const cities = nestedList.querySelectorAll('.location-item[data-type="city"]');
  let hasMatch = false;

  cities.forEach(cityItem => {
    const cityName = cityItem.querySelector('label').textContent.toLowerCase();

    if (cityName.includes(searchTerm)) {
      cityItem.classList.remove('search-hidden');
      hasMatch = true;
    } else {
      cityItem.classList.add('search-hidden');
    }
  });

  // ✅ FORCE SHOW city container
  if (hasMatch) {
    nestedList.style.display = 'block';
    nestedList.classList.add('expanded');
  }

  return hasMatch;
}


  // Enhanced fetchDistricts with caching
  function fetchDistricts(governateId, nestedContainer, searchTerm = '') {
    // Check cache first
    if (fetchedDistricts.has(governateId)) {
      const districts = fetchedDistricts.get(governateId);
      renderDistricts(districts, nestedContainer, searchTerm);
      return Promise.resolve(districts);
    }

    // Show loading
    nestedContainer.innerHTML = '<div class="loading-nested">Loading districts...</div>';
    nestedContainer.style.display = 'block';

    return fetch(`/get-districts/?governate_id=${governateId}`, { 
      headers: { 'X-Requested-With': 'XMLHttpRequest' } 
    })
    .then(res => res.json())
    .then(data => {
      // Cache the results
      fetchedDistricts.set(governateId, data.districts);
      renderDistricts(data.districts, nestedContainer, searchTerm);
      return data.districts;
    })
    .catch(error => {
      console.error('Error fetching districts:', error);
      nestedContainer.innerHTML = '<div class="loading-nested">Error loading districts</div>';
    });
  }

  function renderDistricts(districts, nestedContainer, searchTerm = '') {
    nestedContainer.innerHTML = `
      <div class="nested-label">WILAYATS(DISTRICTS)</div>
      ${districts.map(d => `
        <li class="location-item" data-id="${d.id}" data-type="district" data-name="${d.name.toLowerCase()}">
          <div class="district-item-header">
            <input type="checkbox" name="district" value="${d.id}" data-governate="${d.governate_id || ''}">
            <label>${d.name}</label>
            <i class="fas fa-chevron-down district-dropdown-arrow"></i>
          </div>
          <ul class="nested-list"></ul>
        </li>
      `).join('')}
    `;
    nestedContainer.style.display = 'block';
    nestedContainer.classList.add('expanded');
  }

  // Enhanced fetchCities with caching
  function fetchCities(districtId, nestedContainer, searchTerm = '') {
    // Check cache first
    if (fetchedCities.has(districtId)) {
      const cities = fetchedCities.get(districtId);
      renderCities(cities, nestedContainer, searchTerm);
      return Promise.resolve(cities);
    }

    // Show loading
    nestedContainer.innerHTML = '<div class="loading-nested">Loading cities...</div>';
    nestedContainer.style.display = 'block';

    return fetch(`/get-cities/?district_id=${districtId}`, { 
      headers: { 'X-Requested-With': 'XMLHttpRequest' } 
    })
    .then(res => res.json())
    .then(data => {
      // Cache the results
      fetchedCities.set(districtId, data.cities);
      renderCities(data.cities, nestedContainer, searchTerm);
      return data.cities;
    })
    .catch(error => {
      console.error('Error fetching cities:', error);
      nestedContainer.innerHTML = '<div class="loading-nested">Error loading cities</div>';
    });
  }

  function renderCities(cities, nestedContainer, searchTerm = '') {
    nestedContainer.innerHTML = `
      <div class="nested-label">CITIES</div>
      ${cities.map(c => `
        <li class="location-item city-item" data-id="${c.id}" data-type="city" data-name="${c.name.toLowerCase()}">
          <input type="checkbox" name="city" value="${c.id}" data-district="${c.district_id || ''}">
          <label>${c.name}</label>
        </li>
      `).join('')}
    `;
    nestedContainer.style.display = 'block';
    nestedContainer.classList.add('expanded');
  }

  // Toggle governate dropdown with user-expanded marker
  locationList.addEventListener('click', function(e) {
    const arrow = e.target.closest('.dropdown-arrow');
    const districtArrow = e.target.closest('.district-dropdown-arrow');
    
    if (arrow) {
      e.stopPropagation();
      const header = arrow.closest('.location-item-header');
      const listItem = header.closest('.location-item');
      const nestedList = listItem.querySelector('.nested-list');
      
      // Mark as user-expanded
      listItem.classList.add('user-expanded');
      
      if (nestedList.style.display === 'block') {
        nestedList.style.display = 'none';
        nestedList.classList.remove('expanded');
        arrow.classList.remove('rotated');
      } else {
        // If nested list is empty, fetch districts
        if (nestedList.children.length === 0) {
          const checkbox = listItem.querySelector('input[name="governate"]');
          if (checkbox) {
            fetchDistricts(checkbox.value, nestedList);
          }
        } else {
          nestedList.style.display = 'block';
          nestedList.classList.add('expanded');
          arrow.classList.add('rotated');
        }
      }
    }
    
    if (districtArrow) {
      e.stopPropagation();
      const header = districtArrow.closest('.district-item-header');
      const listItem = header.closest('.location-item');
      const nestedList = listItem.querySelector('.nested-list');
      
      // Mark as user-expanded
      listItem.classList.add('user-expanded');
      
      if (nestedList.style.display === 'block') {
        nestedList.style.display = 'none';
        nestedList.classList.remove('expanded');
        districtArrow.classList.remove('rotated');
      } else {
        // If nested list is empty, fetch cities
        if (nestedList.children.length === 0) {
          const checkbox = listItem.querySelector('input[name="district"]');
          if (checkbox) {
            fetchCities(checkbox.value, nestedList);
          }
        } else {
          nestedList.style.display = 'block';
          nestedList.classList.add('expanded');
          districtArrow.classList.add('rotated');
        }
      }
    }
  });

  // Handle checkbox changes
  locationList.addEventListener('change', function(e) {
    const checkbox = e.target;
    const li = checkbox.closest('li');
    if (!li) return;

    if (checkbox.id === 'select-all-governates') {
      handleSelectAllGovernates(checkbox.checked);
    } 
    else if (li.dataset.type === 'governate') {
      handleGovernateChange(checkbox);
    }
    else if (li.dataset.type === 'district') {
      handleDistrictChange(checkbox);
    }
    else if (li.dataset.type === 'city') {
      updateSelectedLocation();
      updateURL();
    }

    updateSelectAllState();
  });

  // Handle Select All Governates
  function handleSelectAllGovernates(isChecked) {
    const allGovCheckboxes = locationList.querySelectorAll('input[name="governate"]');
    
    allGovCheckboxes.forEach(cb => {
      cb.checked = isChecked;
      const li = cb.closest('li');
      const nested = li.querySelector('.nested-list');
      
      if (isChecked) {
        // Expand and load districts for this governate
        const arrow = li.querySelector('.dropdown-arrow');
        if (arrow) {
          arrow.classList.add('rotated');
        }
        li.classList.add('user-expanded');
        fetchDistricts(cb.value, nested);
      } else {
        // Clear all nested content and collapse
        clearNestedContent(nested);
        const arrow = li.querySelector('.dropdown-arrow');
        if (arrow) {
          arrow.classList.remove('rotated');
        }
        li.classList.remove('user-expanded');
      }
    });

    // If selecting all, also automatically select all districts and cities
    if (isChecked) {
      // Wait for districts to load, then select all districts and cities
      setTimeout(() => {
        selectAllDistrictsAndCities();
      }, 500);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Handle individual governate change
  function handleGovernateChange(checkbox) {
    const li = checkbox.closest('li');
    const nested = li.querySelector('.nested-list');
    const arrow = li.querySelector('.dropdown-arrow');
    
    if (checkbox.checked) {
      // Expand and load districts
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchDistricts(checkbox.value, nested);
    } else {
      // Clear content and collapse
      clearNestedContent(nested);
      if (arrow) {
        arrow.classList.remove('rotated');
      }
      li.classList.remove('user-expanded');
      // Also uncheck any child districts and cities
      const childCheckboxes = nested.querySelectorAll('input[type="checkbox"]');
      childCheckboxes.forEach(cb => cb.checked = false);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Handle individual district change
  function handleDistrictChange(checkbox) {
    const li = checkbox.closest('li');
    const nested = li.querySelector('.nested-list');
    const arrow = li.querySelector('.district-dropdown-arrow');
    
    if (checkbox.checked) {
      // Expand and load cities
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchCities(checkbox.value, nested);
    } else {
      // Clear content and collapse
      clearNestedContent(nested);
      if (arrow) {
        arrow.classList.remove('rotated');
      }
      li.classList.remove('user-expanded');
      // Also uncheck any child cities
      const childCheckboxes = nested.querySelectorAll('input[type="checkbox"]');
      childCheckboxes.forEach(cb => cb.checked = false);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Select all districts and cities (for "All" functionality)
  function selectAllDistrictsAndCities() {
    const districtCheckboxes = locationList.querySelectorAll('input[name="district"]');
    districtCheckboxes.forEach(cb => {
      cb.checked = true;
      const li = cb.closest('li');
      const nested = li.querySelector('.nested-list');
      const arrow = li.querySelector('.district-dropdown-arrow');
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchCities(cb.value, nested);
    });

    // Wait for cities to load, then select all cities
    setTimeout(() => {
      const cityCheckboxes = locationList.querySelectorAll('input[name="city"]');
      cityCheckboxes.forEach(cb => cb.checked = true);
      updateSelectedLocation();
      updateURL();
    }, 1000);
  }

  // Clear nested content
  function clearNestedContent(container) {
    if (container) {
      container.innerHTML = '';
      container.style.display = 'none';
      container.classList.remove('expanded');
    }
  }

  // Update Select All state
  function updateSelectAllState() {
    const allGovCheckboxes = locationList.querySelectorAll('input[name="governate"]');
    const checkedGovCheckboxes = locationList.querySelectorAll('input[name="governate"]:checked');
    
    selectAllGov.checked = allGovCheckboxes.length > 0 && allGovCheckboxes.length === checkedGovCheckboxes.length;
    selectAllGov.indeterminate = checkedGovCheckboxes.length > 0 && checkedGovCheckboxes.length < allGovCheckboxes.length;
  }

  // NEW: Function to deselect "All" checkbox when individual locations are removed
  function deselectAllCheckbox() {
    if (selectAllGov) {
      selectAllGov.checked = false;
      selectAllGov.indeterminate = false;
    }
  }

  // Clear button
  clearBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    locationList.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.indeterminate = false;
    });
    locationList.querySelectorAll('ul.nested-list').forEach(u => { 
      u.innerHTML = ''; 
      u.style.display = 'none';
      u.classList.remove('expanded');
    });
    // Reset all arrows and user-expanded markers
    locationList.querySelectorAll('.dropdown-arrow, .district-dropdown-arrow').forEach(arrow => {
      arrow.classList.remove('rotated');
    });
    locationList.querySelectorAll('.user-expanded').forEach(item => {
      item.classList.remove('user-expanded');
    });
    locationList.querySelectorAll('.search-hidden').forEach(item => {
      item.classList.remove('search-hidden');
    });
    selectedInput.value = "Select Location";
    locationSearch.value = ''; // Clear search
    updateURL();
    locationContainer.style.display = 'none';
  });

  // FIXED: Update selected location with proper names
  function updateSelectedLocation() {
    // Get selected governates with names
    const selectedGovs = Array.from(locationList.querySelectorAll('input[name="governate"]:checked'))
      .map(cb => {
        const label = cb.closest('.location-item-header')?.querySelector('label');
        return label ? label.textContent : cb.value;
      });
    
    // Get selected districts with names
    const selectedDistricts = Array.from(locationList.querySelectorAll('input[name="district"]:checked'))
      .map(cb => {
        const label = cb.closest('.district-item-header')?.querySelector('label');
        return label ? label.textContent : cb.value;
      });
    
    // Get selected cities with names
    const selectedCities = Array.from(locationList.querySelectorAll('input[name="city"]:checked'))
      .map(cb => {
        const label = cb.closest('.location-item')?.querySelector('label');
        return label ? label.textContent : cb.value;
      });

    let text = '';
    
    if (selectedGovs.length > 0) {
      text += selectedGovs.join(', ');
    }
    
    if (selectedDistricts.length > 0) {
      text += (text ? ' > ' : '') + selectedDistricts.join(', ');
    }
    
    if (selectedCities.length > 0) {
      text += (text ? ' > ' : '') + selectedCities.join(', ');
    }

    selectedInput.value = text || "Select Location";
  }

  function updateURL() {
    // Get CURRENT URL parameters to preserve existing filters
    const params = new URLSearchParams(window.location.search);
    
    // Remove existing location parameters to avoid duplicates
    params.delete('governate');
    params.delete('district');
    params.delete('city');
    
    // Get selected governates
    const selectedGovs = Array.from(locationList.querySelectorAll('input[name="governate"]:checked'))
      .map(cb => cb.value);
    selectedGovs.forEach(gov => params.append('governate', gov));
    
    // Get selected districts
    const selectedDistricts = Array.from(locationList.querySelectorAll('input[name="district"]:checked'))
      .map(cb => cb.value);
    selectedDistricts.forEach(dist => params.append('district', dist));
    
    // Get selected cities
    const selectedCities = Array.from(locationList.querySelectorAll('input[name="city"]:checked'))
      .map(cb => cb.value);
    selectedCities.forEach(city => params.append('city', city));

    window.history.replaceState(null, '', '?' + params.toString());

    // Refresh the results - use the complete URL with all parameters
    const container = document.getElementById('headset-list-container');
    if (container) {
        container.innerHTML = '<div class="loading">Loading...</div>';
        fetch(`{% url 'headset' %}?${params.toString()}`, { 
            headers: { 'X-Requested-With': 'XMLHttpRequest' } 
        })
        .then(r => r.text())
        .then(html => { 
            container.innerHTML = html; 
        })
        .catch(error => {
            console.error('Error:', error);
            container.innerHTML = '<div class="error-message">Error loading results</div>';
        });
    }
}

  // NEW: Global function to update location from URL (for breadcrumb removal)
  window.updateLocationFromURL = function() {
    const params = new URLSearchParams(window.location.search);
    const governateIds = params.getAll('governate');
    const districtIds = params.getAll('district');
    const cityIds = params.getAll('city');
    
    // Get names for governates
    const selectedGovs = governateIds.map(govId => {
      const govItem = document.querySelector(`.location-item[data-type="governate"][data-id="${govId}"]`);
      return govItem ? govItem.querySelector('label').textContent : govId;
    });
    
    // Get names for districts
    const selectedDistricts = districtIds.map(distId => {
      const distItem = document.querySelector(`.location-item[data-type="district"][data-id="${distId}"]`);
      return distItem ? distItem.querySelector('label').textContent : distId;
    });
    
    // Get names for cities
    const selectedCities = cityIds.map(cityId => {
      const cityItem = document.querySelector(`.location-item[data-type="city"][data-id="${cityId}"]`);
      return cityItem ? cityItem.querySelector('label').textContent : cityId;
    });
    
    let text = '';
    
    if (selectedGovs.length > 0) {
      text += selectedGovs.join(', ');
    }
    
    if (selectedDistricts.length > 0) {
      text += (text ? ' > ' : '') + selectedDistricts.join(', ');
    }
    
    if (selectedCities.length > 0) {
      text += (text ? ' > ' : '') + selectedCities.join(', ');
    }
    
    selectedInput.value = text || "Select Location";
    
    // Also deselect "All" checkbox if any location is removed
    if (governateIds.length === 0 && districtIds.length === 0 && cityIds.length === 0) {
      deselectAllCheckbox();
    }
  };

  // NEW: Event listener for remove filter buttons (X buttons) - FIXED
  document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-filter')) {
      const key = e.target.getAttribute('data-key');
      const value = e.target.getAttribute('data-value');
      
      // If removing a location filter (governate, district, or city)
      if (key === 'governate' || key === 'district' || key === 'city') {
        // Deselect "All" checkbox
        deselectAllCheckbox();
        
        // Also uncheck the corresponding checkbox in the location dropdown
        if (key === 'governate') {
          const govCheckbox = locationList.querySelector(`input[name="governate"][value="${value}"]`);
          if (govCheckbox) {
            govCheckbox.checked = false;
            handleGovernateChange(govCheckbox);
          }
        } else if (key === 'district') {
          const distCheckbox = locationList.querySelector(`input[name="district"][value="${value}"]`);
          if (distCheckbox) {
            distCheckbox.checked = false;
            handleDistrictChange(distCheckbox);
          }
        } else if (key === 'city') {
          const cityCheckbox = locationList.querySelector(`input[name="city"][value="${value}"]`);
          if (cityCheckbox) {
            cityCheckbox.checked = false;
          }
        }
        
        // Update URL and refresh
        updateURL();
        
        // Force update the location display after a short delay
        setTimeout(() => {
          window.updateLocationFromURL();
        }, 100);
        
        e.preventDefault();
      }
    }
  });

  // Initialize selected location from URL params
  function initializeFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    
    // Set governates
    const govParams = urlParams.getAll('governate');
    govParams.forEach(govId => {
      const govCheckbox = locationList.querySelector(`input[name="governate"][value="${govId}"]`);
      if (govCheckbox) {
        govCheckbox.checked = true;
        handleGovernateChange(govCheckbox);
      }
    });
    
    // Set districts
    const districtParams = urlParams.getAll('district');
    districtParams.forEach(distId => {
      const distCheckbox = locationList.querySelector(`input[name="district"][value="${distId}"]`);
      if (distCheckbox) {
        distCheckbox.checked = true;
        handleDistrictChange(distCheckbox);
      }
    });
    
    // Set cities
    const cityParams = urlParams.getAll('city');
    cityParams.forEach(cityId => {
      const cityCheckbox = locationList.querySelector(`input[name="city"][value="${cityId}"]`);
      if (cityCheckbox) {
        cityCheckbox.checked = true;
      }
    });

    updateSelectedLocation();
    updateSelectAllState();
  }

  // Initialize from URL on page load
  initializeFromURL();
});
</script>

<div class="filter-item" id="toggle-price">
  <label for="price-range">Price Range</label>
  <i class="fas fa-chevron-down dropdown-icons"></i>

</div>

<div class="separators"></div>

<div class="price-container" id="price-container" style="display: none;">
  <div class="price-inputs">
  <label>From</label>
  <input type="number" id="price_from" placeholder="Min Price">  <!-- Changed id -->
  <label>To</label>
  <input type="number" id="price_to" placeholder="Max Price">    <!-- Changed id -->
</div>
  <hr>
  <button type="button" class="btn-apply" id="apply-price-filter">Apply</button>
  <button type="button" class="btn-apply" id="clear-price-filter">Clear</button>

<script>
document.getElementById('toggle-price').addEventListener('click', function(e) {
    e.stopPropagation();
    const container = document.getElementById('price-container');
    const wasVisible = container.style.display === 'block';

    closeAllFilterContainers();

    if (!wasVisible) {
        const rect = this.getBoundingClientRect();
        
        container.style.left = `${rect.left + window.scrollX}px`;
        container.style.display = 'block';
    }
});

document.getElementById('apply-price-filter').addEventListener('click', function () {

    let priceFrom = document.getElementById('price_from').value.trim();
    let priceTo = document.getElementById('price_to').value.trim();

    // 🔥 Validation: Show warning if ANY one is empty
    if (priceFrom === "" || priceTo === "") {
        alert("Please enter both 'From' and 'To' prices.");
        return;
    }

    // Convert after validation
    priceFrom = Number(priceFrom);
    priceTo = Number(priceTo);

    // 🔥 Validation: From must not exceed To
    if (priceFrom > priceTo) {
        alert("Error: 'From' price cannot be greater than 'To' price.");
        return;
    }

    // Update URL params
    const queryParams = new URLSearchParams(window.location.search);

    queryParams.set('price_from', priceFrom);
    queryParams.set('price_to', priceTo);

    // Update selected price text in input box
    document.getElementById('selected-price').value = `${priceFrom} - ${priceTo}`;

    // Update results dynamically
    updateCarFilters();

    // Update URL (no reload)
    window.history.replaceState(null, '', '?' + queryParams.toString());

    document.getElementById('price-container').style.display = 'none';
});

document.getElementById('clear-price-filter').addEventListener('click', function () {

    document.getElementById('price_from').value = '';
    document.getElementById('price_to').value = '';

    document.getElementById('selected-price').value = "Select Price Range";

    const queryParams = new URLSearchParams(window.location.search);
    queryParams.delete('price_from');
    queryParams.delete('price_to');

    window.history.replaceState(null, '', '?' + queryParams.toString());

    updateCarFilters();

    document.getElementById('price-container').style.display = 'none';
});

function updateCarFilters() {
    const container = document.getElementById('headset-list-container');
    if (!container) {
        console.error('Car list container not found');
        return;
    }

    container.innerHTML = '<div class="loading-indicator">Loading...</div>';

    const params = new URLSearchParams(window.location.search);

    const priceFrom = document.getElementById('price_from').value.trim();
    const priceTo = document.getElementById('price_to').value.trim();

    if (priceFrom !== "") params.set('price_from', priceFrom);
    if (priceTo !== "") params.set('price_to', priceTo);

    fetch(`{% url 'headset' %}?${params.toString()}`, {
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.text();
    })
    .then(html => {
        container.innerHTML = html;
        history.pushState(null, '', `?${params.toString()}`);
    })
    .catch(error => {
        console.error('Error:', error);
        container.innerHTML = '<div class="error-message">Error loading results. Please try again.</div>';
    });
}

window.addEventListener('load', function () {
    const urlParams = new URLSearchParams(window.location.search);
    const priceFrom = urlParams.get('price_from') || '';
    const priceTo = urlParams.get('price_to') || '';

    document.getElementById('price_from').value = priceFrom;
    document.getElementById('price_to').value = priceTo;

    if (priceFrom || priceTo) {
        document.getElementById('selected-price').value = `${priceFrom || '0'} - ${priceTo || '∞'}`;
    }
});
</script>

    // Update URL - using 'types' parameter to match Django view
    const params = new URLSearchParams(window.location.search);

    updateQuadbikesFilters(params);

    params.delete('listing_type');
    updateQuadbikesFilters(params);
    
    // Close dropdown
    document.getElementById('listing-type-container').style.display = 'none';

function initListingTypeFilterFromURL() {

            'Accept': 'text/html'
        }

        return response.text();

    .then(html => {

        window.history.replaceState(null, '', '?' + params.toString());

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Toggle dropdown
    document.getElementById('toggle-condition').addEventListener('click', function(e) {
        e.stopPropagation();
        const container = document.getElementById('condition-container');
        const wasVisible = container.style.display === 'block';

        closeAllFilterContainers();
        if (!wasVisible) {
            const rect = this.getBoundingClientRect();
            
            container.style.left = `${rect.left + window.scrollX}px`;
            container.style.display = 'block';
        }
    });

    // Checkbox changes
    document.querySelectorAll('input[name="condition"]').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            updateConditionFilter();
        });
    });

    // Clear filter
    document.getElementById('clear-condition-filter').addEventListener('click', function() {
        clearConditionFilter();
    });

    // Initialize from URL
    initConditionFilterFromURL();
});

function updateConditionFilter() {
    const selected = Array.from(document.querySelectorAll('input[name="condition"]:checked'))
        .map(cb => cb.value);

    const labels = Array.from(document.querySelectorAll('input[name="condition"]:checked'))
        .map(cb => document.querySelector(`label[for="condition_${cb.value}"]`).textContent);

    // Update UI
    document.getElementById('selected-condition').value = labels.length > 0 ? labels.join(', ') : "Select Condition(s)";

    // Update URL
    const params = new URLSearchParams(window.location.search);
    if (selected.length > 0) {
        params.set('condition', selected.join(','));
    } else {
        params.delete('condition');
    }

function clearConditionFilter() {
    document.querySelectorAll('input[name="condition"]').forEach(cb => cb.checked = false);
    document.getElementById('selected-condition').value = "Select Condition(s)";
    
    const params = new URLSearchParams(window.location.search);
    params.delete('condition');
    updateQuadbikesFilters(params);
    
    document.getElementById('condition-container').style.display = 'none';
}

function initConditionFilterFromURL() {
    const params = new URLSearchParams(window.location.search);
    const condition = params.get('condition');
    
    if (condition) {
        const values = condition.split(',');
        values.forEach(val => {
            const cb = document.querySelector(`input[name="condition"][value="${val}"]`);
            if (cb) cb.checked = true;
        });
        const labels = values.map(val => {
            const label = document.querySelector(`label[for="condition_${val}"]`);
            return label ? label.textContent : '';
        }).filter(Boolean);
        document.getElementById('selected-condition').value = labels.join(', ');
    }
}

function updateQuadbikesFilters(params) {
    const container = document.getElementById('headset-list-container');
    if (!container) {
        console.error('headset container not found');
        return;
    }
    container.innerHTML = '<div class="loading-indicator">Loading...</div>';
    
    fetch(`{% url 'headset' %}?${params.toString()}`, {
        headers: { 
            'X-Requested-With': 'XMLHttpRequest',
            'Accept': 'text/html'
        }
    })
    .then(response => {
        if (!response.ok) throw new Error('Network error');
        return response.text();
    })
    .then(html => {
        container.innerHTML = html;
        window.history.replaceState(null, '', '?' + params.toString());
    })
    .catch(error => {
        console.error('Error:', error);
        container.innerHTML = '<div class="error-message">Error loading results</div>';
    });
}

// Favorite toggle function
function toggleFavorite(button) {
    const icon = button.querySelector('i');
    const productId = button.getAttribute('data-product-id');
    const productType = button.getAttribute('data-product-type');
    const isAuthenticated = button.getAttribute('data-is-authenticated') === 'true';
    
    if (!isAuthenticated) {
        window.location.href = '/login/';
        return;
    }
    
    const isCurrentlyFavorite = icon.classList.contains('filled');
    const action = isCurrentlyFavorite ? 'remove' : 'add';
    
    // Toggle visual state immediately for better UX
    if (isCurrentlyFavorite) {
        icon.classList.remove('fas', 'filled');
        icon.classList.add('far');
    } else {
        icon.classList.remove('far');
        icon.classList.add('fas', 'filled');
    }

    // Update localStorage
    localStorage.setItem(`favorite_${productType}_${productId}`, !isCurrentlyFavorite);
    
    // Send AJAX request
    fetch(`/add-to-favorites/${productType}/${productId}/${action}/`, {
        method: 'GET',
        headers: { 
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': getCookie('csrftoken')
        },
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'error') {
            // Revert visual state if there was an error
            if (isCurrentlyFavorite) {
                icon.classList.remove('far');
                icon.classList.add('fas', 'filled');
            } else {
                icon.classList.remove('fas', 'filled');
                icon.classList.add('far');
            }
            console.error("Error updating favorite:", data.message);
        }
    })
    .catch(error => {
        console.error("Error updating favorite:", error);
        // Revert visual state on error
        if (isCurrentlyFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas', 'filled');
        } else {
            icon.classList.remove('fas', 'filled');
            icon.classList.add('far');
        }
    });
}

// Helper function to get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Initialize favorite icons on page load
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.favorite-btn i').forEach(icon => {
        const button = icon.closest('.favorite-btn');
        const productId = button.getAttribute('data-product-id');
        const productType = button.getAttribute('data-product-type');
        
        // Check localStorage for favorite status
        const isFavorite = localStorage.getItem(`favorite_${productType}_${productId}`) === 'true';
        
        if (isFavorite) {
            icon.classList.remove('far');
            icon.classList.add('fas', 'filled');
        } else {
            icon.classList.remove('fas', 'filled');
            icon.classList.add('far');
        }
    });
});

    // Initialize location data attributes
    function initializeLocationData() {
        // Add data attributes to all location elements for easier retrieval
        document.querySelectorAll('input[name="governate"], input[name="district"], input[name="city"]').forEach(input => {
            const label = document.querySelector(`label[for="${input.id}"]`) || input.closest('label');
            if (label && label.textContent) {
                input.dataset.name = label.textContent.trim();
            }
            input.dataset.type = input.name;
            input.dataset.id = input.value;
        });
        
        // Also add to location items if they exist
        document.querySelectorAll('.location-item').forEach(item => {
            const input = item.querySelector('input');
            const label = item.querySelector('label');
            if (input && label) {
                input.dataset.name = label.textContent.trim();
                input.dataset.type = item.dataset.type;
                input.dataset.id = item.dataset.id;
            }
        });
    }

   // ✅ NEW: Function to update location breadcrumbs
    function updateLocationBreadcrumbs() {
        const params = new URLSearchParams(window.location.search);
        const governateIds = params.getAll('governate');
        const districtIds = params.getAll('district');
        const cityIds = params.getAll('city');

        const governateField = document.querySelector('#selected-governate');
        const districtField = document.querySelector('#selected-district');
        const cityField = document.querySelector('#selected-city');
        const locationField = document.querySelector('#selected-location');

        // Get location names from DOM or use a more reliable approach
        const selectedGovs = getLocationNames(governateIds, 'governate');
        const selectedDistricts = getLocationNames(districtIds, 'district');
        const selectedCities = getLocationNames(cityIds, 'city');
        
        // Update individual fields
        if (governateField) governateField.value = selectedGovs.join(', ') || '';
        if (districtField) districtField.value = selectedDistricts.join(', ') || '';
        if (cityField) cityField.value = selectedCities.join(', ') || '';
        
        // Build location breadcrumb text
        let locationText = '';
        if (selectedGovs.length > 0) {
            locationText = selectedGovs.join(', ');
        }
        if (selectedDistricts.length > 0) {
            locationText += (locationText ? ' > ' : '') + selectedDistricts.join(', ');
        }
        if (selectedCities.length > 0) {
            locationText += (locationText ? ' > ' : '') + selectedCities.join(', ');
        }
        
        if (locationField) {
            locationField.value = locationText || "Select Location";
        }
    }

    // ✅ NEW: Helper function to get location names
    function getLocationNames(ids, type) {
        if (!ids || ids.length === 0) return [];
        
        const names = [];
        
        ids.forEach(id => {
            let name = id; // Default to ID if name not found
            
            // Try to find the element in the DOM
            const element = document.querySelector(`.location-item[data-type="${type}"][data-id="${id}"]`);
            if (element) {
                const label = element.querySelector('label');
                if (label) {
                    name = label.textContent.trim();
                }
            } else {
                // If element not found in DOM, try to get from data-name attribute or cached data
                const cachedElement = document.querySelector(`[data-id="${id}"]`);
                if (cachedElement && cachedElement.dataset.name) {
                    name = cachedElement.dataset.name;
                }
            }
            
            names.push(name);
        });
        
        return names;
    }
    // Sync brand grid system with URL state
    function syncBrandGridSystem(brandParam, modelNumberParam) {
        // Clear previous selections
        document.querySelectorAll('.brand-card.selected, .model-card.selected').forEach(el => {
            el.classList.remove('selected');
        });
        
        // Update selected brand
        if (typeof window.selectedBrand !== 'undefined') {
            window.selectedBrand = brandParam || null;
        }
        if (typeof window.selectedModels !== 'undefined') {
            window.selectedModels = modelNumberParam ? modelNumberParam.split(',') : [];
        }
        
        // Select brand in grid if exists
        if (brandParam) {
            const brands = brandParam.split(',');
            brands.forEach(brand => {
                const brandCard = document.querySelector(`.brand-card[data-make="${brand}"]`);
                if (brandCard) {
                    brandCard.classList.add('selected');
                }
            });
            
            // Show models container if we're in brand grid view and models exist
            const brandGrid = document.getElementById('brandGrid');
            const modelsContainer = document.getElementById('modelsContainer');
            if (brandGrid && modelsContainer && brandGrid.style.display !== 'none') {
                // Only show models if we have the showModels function and exactly one brand
                if (typeof showModels !== 'undefined' && brands.length === 1) {
                    showModels(brands[0]);
                }
            }
        }
        
        // Select models in grid (always update regardless of container visibility)
        if (modelNumberParam) {
            const selectedModels = modelNumberParam.split(',');
            setTimeout(() => {
                selectedModels.forEach(model => {
                    const modelCard = [...document.querySelectorAll('.model-card span')]
                        .find(span => span.textContent === model);
                    if (modelCard) {
                        modelCard.parentElement.classList.add('selected');
                    }
                });
            }, 100);
        }
    }

    // Sync dropdown filter system with URL state

        // Sync brand checkboxes
        document.querySelectorAll('input[name="brand"]').forEach(checkbox => {
            checkbox.checked = brandParam ? brandParam.split(',').includes(checkbox.value) : false;
        });

        // Sync model checkboxes
        document.querySelectorAll('input[name="model"]').forEach(checkbox => {
            checkbox.checked = modelNumberParam ? modelNumberParam.split(',').includes(checkbox.value) : false;
        });

        // Render models if brands are selected (for dropdown system only)
        if (brandParam) {
            const selectedBrands = brandParam.split(',');
            if (typeof renderModels !== 'undefined') {
                renderModels(selectedBrands);
            }
        } else {
            const modelList = document.getElementById('model-list');
            if (modelList) {
                modelList.innerHTML = '<p style="padding:5px;">Select a brand first</p>';
                // Also hide the model container if no brands are selected
                const modelContainer = document.getElementById('model-container');
                if (modelContainer) {
                    modelContainer.style.display = 'none';
                }
            }
        }
    }

    // Function to get hierarchical relationships
    function getLocationHierarchy() {
        const hierarchy = {};
        
        // Get governate-district relationships from the DOM
        document.querySelectorAll('.location-item[data-type="governate"]').forEach(governateItem => {
            const governateId = governateItem.dataset.id;
            const districtItems = governateItem.querySelectorAll('.location-item[data-type="district"]');
            hierarchy[governateId] = {
                districts: Array.from(districtItems).map(district => district.dataset.id),
                cities: []
            };
        });
        
        // Get district-city relationships from the DOM
        document.querySelectorAll('.location-item[data-type="district"]').forEach(districtItem => {
            const districtId = districtItem.dataset.id;
            const cityItems = districtItem.querySelectorAll('.location-item[data-type="city"]');
            hierarchy[districtId] = {
                cities: Array.from(cityItems).map(city => city.dataset.id)
            };
        });
        
        return hierarchy;
    }

    // Function to get cities for a district
    function getCitiesForDistrict(districtId) {
        const districtItem = document.querySelector(`.location-item[data-type="district"][data-id="${districtId}"]`);
        if (!districtItem) return [];
        
        const cityItems = districtItem.querySelectorAll('.location-item[data-type="city"]');
        return Array.from(cityItems).map(city => city.dataset.id);
    }

    // Function to get districts and cities for a governate
    function getDistrictsAndCitiesForGovernate(governateId) {
        const governateItem = document.querySelector(`.location-item[data-type="governate"][data-id="${governateId}"]`);
        if (!governateItem) return { districts: [], cities: [] };
        
        const districtItems = governateItem.querySelectorAll('.location-item[data-type="district"]');
        const districts = Array.from(districtItems).map(district => district.dataset.id);
        
        const cities = [];
        districtItems.forEach(districtItem => {
            const cityItems = districtItem.querySelectorAll('.location-item[data-type="city"]');
            cities.push(...Array.from(cityItems).map(city => city.dataset.id));
        });
        
        return { districts, cities };
    }

    // NEW: Function to reset location dropdown lists when items are removed
    function resetLocationDropdownLists() {
        const params = new URLSearchParams(window.location.search);
        const governates = params.getAll('governate');
        const districts = params.getAll('district');
        const cities = params.getAll('city');

        // If no locations are selected, ensure all lists are visible and reset
        if (governates.length === 0 && districts.length === 0 && cities.length === 0) {
            // Reset "All" checkbox
            const allCheckbox = document.querySelector('#select-all-governates');
            if (allCheckbox) allCheckbox.checked = false;
            
            // Show all governates
            document.querySelectorAll('.location-item[data-type="governate"]').forEach(item => {
                item.style.display = '';
            });
            
            // Show all districts (they might be hidden due to search)
            document.querySelectorAll('.location-item[data-type="district"]').forEach(item => {
                item.style.display = '';
            });
            
            // Show all cities (they might be hidden due to search)
            document.querySelectorAll('.location-item[data-type="city"]').forEach(item => {
                item.style.display = '';
            });
            
            // Reset any search
            const locationSearch = document.getElementById('location-search');
            if (locationSearch) locationSearch.value = '';
        }
    }
function getLabelForValue(name, value) {
    const input = document.querySelector(
        `input[name="${name}"][value="${value}"]`
    );

    if (!input) return value;

    const label =
        document.querySelector(`label[for="${input.id}"]`) ||
        input.closest('label');

    return label ? label.textContent.trim() : value;
}

    // Function to handle hierarchical location removal
    function handleLocationRemoval(key, value, params) {
        console.log(`Removing location: ${key} = ${value}`); // Debug log
        
        if (key === 'city') {
            // Remove only the specific city
            const currentCities = params.getAll('city').flatMap(v => v.split(','));
            const updatedCities = currentCities.filter(v => v && v !== value);
            
            params.delete('city');
            if (updatedCities.length > 0) {
                updatedCities.forEach(v => params.append('city', v));
            }
            
            // Uncheck only this city
            const cityCheckbox = document.querySelector(`input[name="city"][value="${value}"]`);
            if (cityCheckbox) cityCheckbox.checked = false;
            
        } else if (key === 'district') {
            // Remove district and all its cities
            const currentDistricts = params.getAll('district').flatMap(v => v.split(','));
            const updatedDistricts = currentDistricts.filter(v => v && v !== value);
            
            params.delete('district');
            if (updatedDistricts.length > 0) {
                updatedDistricts.forEach(v => params.append('district', v));
            }
            
            // Get all cities under this district and remove them
            const citiesToRemove = getCitiesForDistrict(value);
            const currentCities = params.getAll('city').flatMap(v => v.split(','));
            const updatedCities = currentCities.filter(cityId => !citiesToRemove.includes(cityId));
            
            params.delete('city');
            if (updatedCities.length > 0) {
                updatedCities.forEach(v => params.append('city', v));
            }
            
            // Uncheck the district and all its cities
            const districtCheckbox = document.querySelector(`input[name="district"][value="${value}"]`);
            if (districtCheckbox) districtCheckbox.checked = false;
            
            citiesToRemove.forEach(cityId => {
                const cityCheckbox = document.querySelector(`input[name="city"][value="${cityId}"]`);
                if (cityCheckbox) cityCheckbox.checked = false;
            });
            
        } else if (key === 'governate') {
            // Remove governate and all its districts and cities
            const currentGovernates = params.getAll('governate').flatMap(v => v.split(','));
            const updatedGovernates = currentGovernates.filter(v => v && v !== value);
            
            params.delete('governate');
            if (updatedGovernates.length > 0) {
                updatedGovernates.forEach(v => params.append('governate', v));
            }
            
            // Get all districts and cities under this governate and remove them
            const { districts: districtsToRemove, cities: citiesToRemove } = getDistrictsAndCitiesForGovernate(value);
            
            // Remove districts
            const currentDistricts = params.getAll('district').flatMap(v => v.split(','));
            const updatedDistricts = currentDistricts.filter(districtId => !districtsToRemove.includes(districtId));
            
            params.delete('district');
            if (updatedDistricts.length > 0) {
                updatedDistricts.forEach(v => params.append('district', v));
            }
            
            // Remove cities
            const currentCities = params.getAll('city').flatMap(v => v.split(','));
            const updatedCities = currentCities.filter(cityId => !citiesToRemove.includes(cityId));
            
            params.delete('city');
            if (updatedCities.length > 0) {
                updatedCities.forEach(v => params.append('city', v));
            }
            
            // Uncheck the governate and all its districts and cities
            const governateCheckbox = document.querySelector(`input[name="governate"][value="${value}"]`);
            if (governateCheckbox) governateCheckbox.checked = false;
            
            districtsToRemove.forEach(districtId => {
                const districtCheckbox = document.querySelector(`input[name="district"][value="${districtId}"]`);
                if (districtCheckbox) districtCheckbox.checked = false;
            });
            
            citiesToRemove.forEach(cityId => {
                const cityCheckbox = document.querySelector(`input[name="city"][value="${cityId}"]`);
                if (cityCheckbox) cityCheckbox.checked = false;
            });
        }
        
        // Update location display fields
        updateLocationBreadcrumbs();
    }

    // Function to update content via AJAX - ENHANCED
    function updateContent(params) {
        const container = document.getElementById('headset-list-container');
        if (!container) return;
        
        container.innerHTML = '<div class="loading-indicator">Loading...</div>';
        
        fetch(`{% url 'headset' %}?${params.toString()}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.text())
        .then(html => {
            container.innerHTML = html;
            window.history.replaceState(null, '', `?${params.toString()}`);
            
            // Update filter displays and sync both systems
            updateFilterDisplay();
            
            // Force sync both systems after content update
            const brandParam = params.get('brand');
            const modelNumberParam = params.get('model_number');
            
            if (typeof syncBrandGridSystem === 'function') {
                syncBrandGridSystem(brandParam, modelNumberParam);
            }
            if (typeof syncDropdownFilterSystem === 'function') {
                syncDropdownFilterSystem(brandParam, modelNumberParam);
            }
        })
        .catch(err => {
            console.error('Error:', err);
            container.innerHTML = '<div class="error-message">Error loading results</div>';
        });
    }

    // NEW: Function to update active filter badges
    function updateActiveFilterBadges() {
        const params = new URLSearchParams(window.location.search);
        const activeFiltersContainer = document.querySelector('.active-filters');
        
        if (!activeFiltersContainer) return;
        
        // Clear existing badges
        activeFiltersContainer.innerHTML = '';
        
        // Add badges for each active filter
        params.forEach((value, key) => {
            if (key === 'brand') {
                value.split(',').forEach(brand => {
                    if (brand.trim()) {
                        addFilterBadge(activeFiltersContainer, 'brand', brand, `Brand: ${brand}`);
                    }
                });
            } else if (key === 'model_number') {
                value.split(',').forEach(model => {
                    if (model.trim()) {
                        addFilterBadge(activeFiltersContainer, 'model_number', model, `Model: ${model}`);
                    }
                });
            } else if (key === 'price_from' || key === 'price_to') {
                const priceFrom = params.get('price_from');
                const priceTo = params.get('price_to');
                if ((key === 'price_from' && priceFrom) || (key === 'price_to' && priceTo)) {
                    // Only add once
                    if (key === 'price_from') {
                        const priceText = priceTo ? `${priceFrom} - ${priceTo}` : `From ${priceFrom}`;
                        addFilterBadge(activeFiltersContainer, 'price_range', `${priceFrom}-${priceTo || ''}`, `Price: ${priceText}`);
                    }
                }
            } else if (key === 'year_from' || key === 'year_to') {
                const yearFrom = params.get('year_from');
                const yearTo = params.get('year_to');
                if ((key === 'year_from' && yearFrom) || (key === 'year_to' && yearTo)) {
                    // Only add once
                    if (key === 'year_from') {
                        const yearText = yearTo ? `${yearFrom} - ${yearTo}` : `From ${yearFrom}`;
                        addFilterBadge(activeFiltersContainer, 'year_range', `${yearFrom}-${yearTo || ''}`, `Year: ${yearText}`);
                    }
                }
            } else if (['governate', 'district', 'city'].includes(key)) {
                value.split(',').forEach(location => {
                    if (location.trim()) {
                        addFilterBadge(activeFiltersContainer, key, location, `${key.charAt(0).toUpperCase() + key.slice(1)}: ${location}`);
                    }
                });
            }
            // Add more filter types as needed...
        });
    }

    // NEW: Function to add individual filter badge
    function addFilterBadge(container, key, value, displayText) {
        const badge = document.createElement('div');
        badge.className = 'filter-badge';
        badge.innerHTML = `
            <span>${displayText}</span>
            <button class="remove-filter" data-key="${key}" data-value="${value}">×</button>
        `;
        container.appendChild(badge);
    }

    // EVENT LISTENER FOR REMOVE FILTER BUTTONS
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-filter')) {
            e.preventDefault();
            e.stopPropagation();
            
            const key = e.target.getAttribute('data-key');
            const value = e.target.getAttribute('data-value');
            
            console.log('Remove filter clicked:', key, value); // Debug log
            
            if (key && value) {
                handleFilterRemoval(key, value);
            }
        }
    });

    document.addEventListener('change', function(e) {
        if (e.target.name === 'governate' || e.target.name === 'district' || e.target.name === 'city') {
            setTimeout(updateLocationBreadcrumbs, 100);
        }
    });

    // Clear all filters
    document.addEventListener('click', function(e) {
        if (e.target.matches('#clear-all-filters')) {
            e.preventDefault();

            // Clear all checkboxes and radios
            document.querySelectorAll('input[type="checkbox"], input[type="radio"]').forEach(input => {
                input.checked = false;
            });

            // Clear all input fields
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(input => {
                if (input.id !== 'search' && !input.closest('.filter-modal')) {
                    input.value = '';
                }
            });

            // Clear all hidden/selected fields
            const filterFields = [
                '#selected-price', '#selected-year', '#selected-kilometer',
                '#selected-governate', '#selected-district', '#selected-city',
                '#selected-all-filters', '#selected-additional-filters','selected-model','selected-brand',
                '#selected-listing-type', '#selected-category', '#selected-age', '#selected-subcategory'
            ];
            filterFields.forEach(id => {
                const el = document.querySelector(id);
                if (el) el.value = '';
            });

            // Reset brand grid selections
            document.querySelectorAll('.brand-card.selected, .model-card.selected').forEach(el => {
                el.classList.remove('selected');
            });
            
            // Show brand grid and hide models container
            const brandGrid = document.getElementById('brandGrid');
            const modelsContainer = document.getElementById('modelsContainer');
            if (brandGrid) brandGrid.style.display = 'grid';
            if (modelsContainer) modelsContainer.style.display = 'none';

            // Clear model list content and hide model container
            const modelList = document.getElementById('model-list');
            if (modelList) modelList.innerHTML = '<p style="padding:5px;">Select a brand first</p>';
            
            const modelContainer = document.getElementById('model-container');
            if (modelContainer) modelContainer.style.display = 'none';

            // Clear URL params but keep listing_type
            const url = new URL(window.location.href);
           
            url.search = '';

           
            fetch(url.toString(), { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(res => res.text())
                .then(html => {
                    const container = document.querySelector('#headset-list-container');
                    if (container) container.innerHTML = html;
                    history.pushState(null, '', url.toString());
                    updateFilterDisplay();
                })
                .catch(err => console.error('Error:', err));
        }
    });

    // Initial load
    initializeLocationData();
    updateFilterDisplay();
});
