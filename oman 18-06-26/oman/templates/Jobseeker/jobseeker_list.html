<script>
document.addEventListener('DOMContentLoaded', function() {
    const filterForm = document.querySelector('.filter-form');
    const originalOffset = filterForm.offsetTop;
    
    window.addEventListener('scroll', function() {
        if (window.pageYOffset > originalOffset) {
            filterForm.classList.add('sticky');
        } else {
            filterForm.classList.remove('sticky');
        }
    });
});

    }function showCitiesDropdown() {
        var region = document.getElementById('region-dropdown').value;
        var citiesDropdown = document.getElementById('cities-dropdown');
        var citiesList = document.getElementById('cities-list');
        
        var cities = {
            'MS': ['Muscat City', 'Qurum', 'Seeb'],
            'DH': ['Salalah', 'Mirbat', 'Taqah'],
            'BT': ['Sohar', 'Barka', 'Ibri'],
            'DA': ['Nizwa', 'Izki', 'Manah'],
            'SH': ['Sur', 'Ibra', 'Bahla'],
            'BR': ['Buraimi', 'Mahda'],
            'ZU': ['Salalah', 'Mirbat'],
            'DZ': ['Khasab', 'Diba'],
            'WT': ['Haima', 'Shinas']
        };
    
        citiesList.innerHTML = ''; // Clear previous cities
    
        if (region && cities[region]) {
            cities[region].forEach(function(city) {
                var cityOption = document.createElement('div');
                cityOption.textContent = city;
                cityOption.onclick = function() {
                    alert('You selected ' + city + '!');
                    citiesDropdown.style.display = 'none'; // Hide cities dropdown after selection
                };
                citiesList.appendChild(cityOption);
            });
    
            citiesDropdown.style.display = 'block'; // Show cities dropdown
        } else {
            citiesDropdown.style.display = 'none'; // Hide cities dropdown if no region is selected
        }
    }

<style>
.location-search-container {
  position: relative;
  padding: 10px 15px;
  border-bottom: 1px solid #eee;
}

  width: 100%;
  padding: 8px 35px 8px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 14px;
  box-sizing: border-box;

  top: 50%;
  transform: translateY(-50%);

  transform: rotate(180deg);

/* Search related styles */

  display: none !important;
}

.location-item, .nested-label, .label-item, .all {

}

.nested-list {
  transition: all 0.3s ease;
}

.loading-nested {
  padding: 10px;
  text-align: center;

<script>
document.addEventListener('DOMContentLoaded', function() {
  const toggleLocation = document.getElementById('toggle-location-filter');
  const locationContainer = document.getElementById('location-list-container');
  const locationList = document.getElementById('location-list');
  const selectAllGov = document.getElementById('select-all-governates');
  const clearBtn = document.getElementById('clear-location-filter');
  const selectedInput = document.getElementById('selected-location');
  const locationSearch = document.getElementById('location-search');

  // Store fetched data to avoid duplicate API calls
  const fetchedDistricts = new Map();
  const fetchedCities = new Map();

  // Toggle dropdown
  toggleLocation.addEventListener('click', function(e) {
    e.stopPropagation();
    const wasVisible = locationContainer.style.display === 'block';
    closeAllFilterContainers();
    locationContainer.style.display = wasVisible ? 'none' : 'block';
    
    // Focus on search when dropdown opens
    if (locationContainer.style.display === 'block') {
      setTimeout(() => {
        locationSearch.focus();
        locationSearch.select();
      }, 100);
    }
  });

  // Close when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#location-list-container') && !e.target.closest('#toggle-location-filter')) {
      locationContainer.style.display = 'none';
    }
  });

  // Search functionality - SIMPLIFIED and WORKING version
  locationSearch.addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase().trim();
    performSearch(searchTerm);
  });

  // Main search function
  async function performSearch(searchTerm) {
    const allItems = locationList.querySelectorAll('.location-item, .nested-label, .label-item, .all');
    
    if (!searchTerm) {
      // Reset everything when search is cleared
      allItems.forEach(item => {
        item.classList.remove('search-hidden');
        // Reset expanded state for non-user-expanded items
        if (item.classList.contains('location-item') && !item.classList.contains('user-expanded')) {
          const nestedList = item.querySelector('.nested-list');
          const arrow = item.querySelector('.dropdown-arrow, .district-dropdown-arrow');
          if (nestedList && nestedList.children.length > 0) {
            nestedList.style.display = 'none';
            if (arrow) arrow.classList.remove('rotated');
          }
        }
      });
      return;
    }

    // First hide everything
    allItems.forEach(item => {
      item.classList.add('search-hidden');
    });

    // Show matching governates and load their data
    const governateItems = locationList.querySelectorAll('.location-item[data-type="governate"]');
    
    for (const governateItem of governateItems) {
      const governateName = governateItem.querySelector('label').textContent.toLowerCase();
      
      if (governateName.includes(searchTerm)) {
        // Governate name matches - show it and expand
        governateItem.classList.remove('search-hidden');
        await expandAndLoadGovernate(governateItem, searchTerm);
      } else {
        // Check districts under this governate
        const hasMatchingDistricts = await checkDistrictsForMatch(governateItem, searchTerm);
        if (hasMatchingDistricts) {
          governateItem.classList.remove('search-hidden');
          await expandAndLoadGovernate(governateItem, searchTerm);
        }
      }
    }

    // Show labels if any items are visible
    const visibleItems = locationList.querySelectorAll('.location-item:not(.search-hidden)');
    if (visibleItems.length > 0) {
      document.querySelectorAll('.label-item, .all').forEach(label => {
        label.classList.remove('search-hidden');
      });
    }
  }

  // Expand and load governate data
  async function expandAndLoadGovernate(governateItem, searchTerm) {
    const nestedList = governateItem.querySelector('.nested-list');
    const arrow = governateItem.querySelector('.dropdown-arrow');
    
    // Ensure districts are loaded
    if (nestedList.children.length === 0) {
      const governateId = governateItem.dataset.id;
      await fetchDistricts(governateId, nestedList, searchTerm);
    }
    
    // Expand the governate
    nestedList.style.display = 'block';
    nestedList.classList.add('expanded');
    if (arrow) arrow.classList.add('rotated');
    
    // Apply search to loaded districts
    if (searchTerm) {
      const districtItems = nestedList.querySelectorAll('.location-item[data-type="district"]');
      districtItems.forEach(districtItem => {
        const districtName = districtItem.querySelector('label').textContent.toLowerCase();
        if (districtName.includes(searchTerm)) {
          districtItem.classList.remove('search-hidden');
        } else {
          districtItem.classList.add('search-hidden');
        }
      });
    }
  }

  // Check districts for matching search term
  async function checkDistrictsForMatch(governateItem, searchTerm) {
    const nestedList = governateItem.querySelector('.nested-list');
    const governateId = governateItem.dataset.id;
    
    // Ensure districts are loaded
    if (nestedList.children.length === 0) {
      await fetchDistricts(governateId, nestedList, searchTerm);
    }
    
    const districtItems = nestedList.querySelectorAll('.location-item[data-type="district"]');
    let hasMatch = false;
    
    for (const districtItem of districtItems) {
      const districtName = districtItem.querySelector('label').textContent.toLowerCase();
      
      if (districtName.includes(searchTerm)) {
        districtItem.classList.remove('search-hidden');
        hasMatch = true;
      } else {
        // Check cities under this district
        const hasMatchingCities = await checkCitiesForMatch(districtItem, searchTerm);
        if (hasMatchingCities) {
          districtItem.classList.remove('search-hidden');
          hasMatch = true;
        } else {
          districtItem.classList.add('search-hidden');
        }
      }
    }
    
    return hasMatch;
  }

  // Check cities for matching search term
  async function checkCitiesForMatch(districtItem, searchTerm) {
    const nestedList = districtItem.querySelector('.nested-list');
    const districtId = districtItem.dataset.id;
    
    // Ensure cities are loaded
    if (nestedList.children.length === 0) {
      await fetchCities(districtId, nestedList, searchTerm);
    }
    
    const cityItems = nestedList.querySelectorAll('.location-item[data-type="city"]');
    let hasMatch = false;
    
    for (const cityItem of cityItems) {
      const cityName = cityItem.querySelector('label').textContent.toLowerCase();
      if (cityName.includes(searchTerm)) {
        cityItem.classList.remove('search-hidden');
        hasMatch = true;
      } else {
        cityItem.classList.add('search-hidden');
      }
    }
    
    return hasMatch;
  }

  // Enhanced fetchDistricts with caching
  function fetchDistricts(governateId, nestedContainer, searchTerm = '') {
    // Check cache first
    if (fetchedDistricts.has(governateId)) {
      const districts = fetchedDistricts.get(governateId);
      renderDistricts(districts, nestedContainer, searchTerm);
      return Promise.resolve(districts);
    }

    // Show loading
    nestedContainer.innerHTML = '<div class="loading-nested">Loading districts...</div>';
    nestedContainer.style.display = 'block';

    return fetch(`/get-districts/?governate_id=${governateId}`, { 
      headers: { 'X-Requested-With': 'XMLHttpRequest' } 
    })
    .then(res => res.json())
    .then(data => {
      // Cache the results
      fetchedDistricts.set(governateId, data.districts);
      renderDistricts(data.districts, nestedContainer, searchTerm);
      return data.districts;
    })
    .catch(error => {
      console.error('Error fetching districts:', error);
      nestedContainer.innerHTML = '<div class="loading-nested">Error loading districts</div>';
    });
  }

  function renderDistricts(districts, nestedContainer, searchTerm = '') {
    nestedContainer.innerHTML = `
      <div class="nested-label">WILAYATS(DISTRICTS)</div>
      ${districts.map(d => `
        <li class="location-item" data-id="${d.id}" data-type="district" data-name="${d.name.toLowerCase()}">
          <div class="district-item-header">
            <input type="checkbox" name="district" value="${d.id}" data-governate="${d.governate_id || ''}">
            <label>${d.name}</label>
            <i class="fas fa-chevron-down district-dropdown-arrow"></i>
          </div>
          <ul class="nested-list"></ul>
        </li>
      `).join('')}
    `;
    nestedContainer.style.display = 'block';
    nestedContainer.classList.add('expanded');
  }

  // Enhanced fetchCities with caching
  function fetchCities(districtId, nestedContainer, searchTerm = '') {
    // Check cache first
    if (fetchedCities.has(districtId)) {
      const cities = fetchedCities.get(districtId);
      renderCities(cities, nestedContainer, searchTerm);
      return Promise.resolve(cities);
    }

    // Show loading
    nestedContainer.innerHTML = '<div class="loading-nested">Loading cities...</div>';
    nestedContainer.style.display = 'block';

    return fetch(`/get-cities/?district_id=${districtId}`, { 
      headers: { 'X-Requested-With': 'XMLHttpRequest' } 
    })
    .then(res => res.json())
    .then(data => {
      // Cache the results
      fetchedCities.set(districtId, data.cities);
      renderCities(data.cities, nestedContainer, searchTerm);
      return data.cities;
    })
    .catch(error => {
      console.error('Error fetching cities:', error);
      nestedContainer.innerHTML = '<div class="loading-nested">Error loading cities</div>';
    });
  }

  function renderCities(cities, nestedContainer, searchTerm = '') {
    nestedContainer.innerHTML = `
      <div class="nested-label">CITIES</div>
      ${cities.map(c => `
        <li class="location-item city-item" data-id="${c.id}" data-type="city" data-name="${c.name.toLowerCase()}">
          <input type="checkbox" name="city" value="${c.id}" data-district="${c.district_id || ''}">
          <label>${c.name}</label>
        </li>
      `).join('')}
    `;
    nestedContainer.style.display = 'block';
    nestedContainer.classList.add('expanded');
  }

  // Toggle governate dropdown with user-expanded marker
  locationList.addEventListener('click', function(e) {
    const arrow = e.target.closest('.dropdown-arrow');
    const districtArrow = e.target.closest('.district-dropdown-arrow');
    
    if (arrow) {
      e.stopPropagation();
      const header = arrow.closest('.location-item-header');
      const listItem = header.closest('.location-item');
      const nestedList = listItem.querySelector('.nested-list');
      
      // Mark as user-expanded
      listItem.classList.add('user-expanded');
      
      if (nestedList.style.display === 'block') {
        nestedList.style.display = 'none';
        nestedList.classList.remove('expanded');
        arrow.classList.remove('rotated');
      } else {
        // If nested list is empty, fetch districts
        if (nestedList.children.length === 0) {
          const checkbox = listItem.querySelector('input[name="governate"]');
          if (checkbox) {
            fetchDistricts(checkbox.value, nestedList);
          }
        } else {
          nestedList.style.display = 'block';
          nestedList.classList.add('expanded');
          arrow.classList.add('rotated');
        }
      }
    }
    
    if (districtArrow) {
      e.stopPropagation();
      const header = districtArrow.closest('.district-item-header');
      const listItem = header.closest('.location-item');
      const nestedList = listItem.querySelector('.nested-list');
      
      // Mark as user-expanded
      listItem.classList.add('user-expanded');
      
      if (nestedList.style.display === 'block') {
        nestedList.style.display = 'none';
        nestedList.classList.remove('expanded');
        districtArrow.classList.remove('rotated');
      } else {
        // If nested list is empty, fetch cities
        if (nestedList.children.length === 0) {
          const checkbox = listItem.querySelector('input[name="district"]');
          if (checkbox) {
            fetchCities(checkbox.value, nestedList);
          }
        } else {
          nestedList.style.display = 'block';
          nestedList.classList.add('expanded');
          districtArrow.classList.add('rotated');
        }
      }
    }
  });

  // Handle checkbox changes
  locationList.addEventListener('change', function(e) {
    const checkbox = e.target;
    const li = checkbox.closest('li');
    if (!li) return;

    if (checkbox.id === 'select-all-governates') {
      handleSelectAllGovernates(checkbox.checked);
    } 
    else if (li.dataset.type === 'governate') {
      handleGovernateChange(checkbox);
    }
    else if (li.dataset.type === 'district') {
      handleDistrictChange(checkbox);
    }
    else if (li.dataset.type === 'city') {
      updateSelectedLocation();
      updateURL();
    }

    updateSelectAllState();
  });

  // Handle Select All Governates
  function handleSelectAllGovernates(isChecked) {
    const allGovCheckboxes = locationList.querySelectorAll('input[name="governate"]');
    
    allGovCheckboxes.forEach(cb => {
      cb.checked = isChecked;
      const li = cb.closest('li');
      const nested = li.querySelector('.nested-list');
      
      if (isChecked) {
        // Expand and load districts for this governate
        const arrow = li.querySelector('.dropdown-arrow');
        if (arrow) {
          arrow.classList.add('rotated');
        }
        li.classList.add('user-expanded');
        fetchDistricts(cb.value, nested);
      } else {
        // Clear all nested content and collapse
        clearNestedContent(nested);
        const arrow = li.querySelector('.dropdown-arrow');
        if (arrow) {
          arrow.classList.remove('rotated');
        }
        li.classList.remove('user-expanded');
      }
    });

    // If selecting all, also automatically select all districts and cities
    if (isChecked) {
      // Wait for districts to load, then select all districts and cities
      setTimeout(() => {
        selectAllDistrictsAndCities();
      }, 500);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Handle individual governate change
  function handleGovernateChange(checkbox) {
    const li = checkbox.closest('li');
    const nested = li.querySelector('.nested-list');
    const arrow = li.querySelector('.dropdown-arrow');
    
    if (checkbox.checked) {
      // Expand and load districts
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchDistricts(checkbox.value, nested);
    } else {
      // Clear content and collapse
      clearNestedContent(nested);
      if (arrow) {
        arrow.classList.remove('rotated');
      }
      li.classList.remove('user-expanded');
      // Also uncheck any child districts and cities
      const childCheckboxes = nested.querySelectorAll('input[type="checkbox"]');
      childCheckboxes.forEach(cb => cb.checked = false);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Handle individual district change
  function handleDistrictChange(checkbox) {
    const li = checkbox.closest('li');
    const nested = li.querySelector('.nested-list');
    const arrow = li.querySelector('.district-dropdown-arrow');
    
    if (checkbox.checked) {
      // Expand and load cities
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchCities(checkbox.value, nested);
    } else {
      // Clear content and collapse
      clearNestedContent(nested);
      if (arrow) {
        arrow.classList.remove('rotated');
      }
      li.classList.remove('user-expanded');
      // Also uncheck any child cities
      const childCheckboxes = nested.querySelectorAll('input[type="checkbox"]');
      childCheckboxes.forEach(cb => cb.checked = false);
    }

    updateSelectedLocation();
    updateURL();
  }

  // Select all districts and cities (for "All" functionality)
  function selectAllDistrictsAndCities() {
    const districtCheckboxes = locationList.querySelectorAll('input[name="district"]');
    districtCheckboxes.forEach(cb => {
      cb.checked = true;
      const li = cb.closest('li');
      const nested = li.querySelector('.nested-list');
      const arrow = li.querySelector('.district-dropdown-arrow');
      if (arrow) {
        arrow.classList.add('rotated');
      }
      li.classList.add('user-expanded');
      fetchCities(cb.value, nested);
    });

    // Wait for cities to load, then select all cities
    setTimeout(() => {
      const cityCheckboxes = locationList.querySelectorAll('input[name="city"]');
      cityCheckboxes.forEach(cb => cb.checked = true);
      updateSelectedLocation();
      updateURL();
    }, 1000);
  }

  // Clear nested content
  function clearNestedContent(container) {
    if (container) {
      container.innerHTML = '';
      container.style.display = 'none';
      container.classList.remove('expanded');
    }
  }

  // Update Select All state
  function updateSelectAllState() {
    const allGovCheckboxes = locationList.querySelectorAll('input[name="governate"]');
    const checkedGovCheckboxes = locationList.querySelectorAll('input[name="governate"]:checked');
    
    selectAllGov.checked = allGovCheckboxes.length > 0 && allGovCheckboxes.length === checkedGovCheckboxes.length;
    selectAllGov.indeterminate = checkedGovCheckboxes.length > 0 && checkedGovCheckboxes.length < allGovCheckboxes.length;
  }

  // Clear button
  clearBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    locationList.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.indeterminate = false;
    });
    locationList.querySelectorAll('ul.nested-list').forEach(u => { 
      u.innerHTML = ''; 
      u.style.display = 'none';
      u.classList.remove('expanded');
    });
    // Reset all arrows and user-expanded markers
    locationList.querySelectorAll('.dropdown-arrow, .district-dropdown-arrow').forEach(arrow => {
      arrow.classList.remove('rotated');
    });
    locationList.querySelectorAll('.user-expanded').forEach(item => {
      item.classList.remove('user-expanded');
    });
    locationList.querySelectorAll('.search-hidden').forEach(item => {
      item.classList.remove('search-hidden');
    });
    selectedInput.value = "Select Location";
    locationSearch.value = ''; // Clear search
    updateURL();
    locationContainer.style.display = 'none';
  });

  function updateSelectedLocation() {
    const selectedGovs = Array.from(locationList.querySelectorAll('input[name="governate"]:checked'))
      .map(cb => cb.nextElementSibling.textContent);
    
    const selectedDistricts = Array.from(locationList.querySelectorAll('input[name="district"]:checked'))
      .map(cb => cb.nextElementSibling.textContent);
    
    const selectedCities = Array.from(locationList.querySelectorAll('input[name="city"]:checked'))
      .map(cb => cb.nextElementSibling.textContent);

    let text = '';
    
    if (selectedGovs.length > 0) {
      text += selectedGovs.join(', ');
    }
    
    if (selectedDistricts.length > 0) {
      text += (text ? ' > ' : '') + selectedDistricts.join(', ');
    }
    
    if (selectedCities.length > 0) {
      text += (text ? ' > ' : '') + selectedCities.join(', ');
    }

    selectedInput.value = text || "Select Location";
  }

 function updateURL() {
    // FIXED: Get CURRENT URL parameters to preserve ALL existing filters
    const currentParams = new URLSearchParams(window.location.search);
    const params = new URLSearchParams();
    
    // Copy ALL existing parameters except location ones
    for (const [key, value] of currentParams) {
        if (!['governate', 'district', 'city'].includes(key)) {
            params.append(key, value);
        }
    }
    
    // Get selected governates
    const selectedGovs = Array.from(locationList.querySelectorAll('input[name="governate"]:checked'))
      .map(cb => cb.value);
    selectedGovs.forEach(gov => params.append('governate', gov));
    
    // Get selected districts
    const selectedDistricts = Array.from(locationList.querySelectorAll('input[name="district"]:checked'))
      .map(cb => cb.value);
    selectedDistricts.forEach(dist => params.append('district', dist));
    
    // Get selected cities
    const selectedCities = Array.from(locationList.querySelectorAll('input[name="city"]:checked'))
      .map(cb => cb.value);
    selectedCities.forEach(city => params.append('city', city));

    window.history.replaceState(null, '', '?' + params.toString());

    // Refresh the results - FIXED: Use the proper URL with all parameters
    const container = document.getElementById('job-list-container');
    if (container) {
        container.innerHTML = '<div class="loading">Loading...</div>';
        fetch(`{% url 'jobseeker_list' %}?${params.toString()}`, { 
            headers: { 'X-Requested-With': 'XMLHttpRequest' } 
        })
        .then(r => r.text())
        .then(html => { 
            container.innerHTML = html; 
        })
        .catch(error => {
            console.error('Error:', error);
            container.innerHTML = '<div class="error-message">Error loading results</div>';
        });
    }
}

  // Initialize selected location from URL params
  function initializeFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    
    // Set governates
    const govParams = urlParams.getAll('governate');
    govParams.forEach(govId => {
      const govCheckbox = locationList.querySelector(`input[name="governate"][value="${govId}"]`);
      if (govCheckbox) {
        govCheckbox.checked = true;
        handleGovernateChange(govCheckbox);
      }
    });
    
    // Set districts
    const districtParams = urlParams.getAll('district');
    districtParams.forEach(distId => {
      const distCheckbox = locationList.querySelector(`input[name="district"][value="${distId}"]`);
      if (distCheckbox) {
        distCheckbox.checked = true;
        handleDistrictChange(distCheckbox);
      }
    });
    
    // Set cities
    const cityParams = urlParams.getAll('city');
    cityParams.forEach(cityId => {
      const cityCheckbox = locationList.querySelector(`input[name="city"][value="${cityId}"]`);
      if (cityCheckbox) {
        cityCheckbox.checked = true;
      }
    });

    updateSelectedLocation();
    updateSelectAllState();
  }

  // Close all filter containers (if this function exists in your main code)
  function closeAllFilterContainers() {
    // Close other filter containers if needed
    const otherContainers = document.querySelectorAll('.filter-container');
    otherContainers.forEach(container => {
      if (container !== locationContainer) {
        container.style.display = 'none';
      }
    });
  }

  // Initialize from URL on page load
  initializeFromURL();
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
   
    // Toggle additional filters container
    document.getElementById('toggle-additional-filters')?.addEventListener('click', function(e) {
        e.stopPropagation();
        const container = document.getElementById('additional-filters-container');
        const wasVisible = container.style.display === 'block';
        
        closeAllFilterContainers();
        
        if (!wasVisible) {
            const rect = this.getBoundingClientRect();
            container.style.top = `${rect.bottom + window.scrollY}px`;
            container.style.left = `${rect.left + window.scrollX}px`;
            container.style.display = 'block';
        }
    });

    // Checkbox behavior for additional filters
    document.querySelectorAll('.additional-filters-inputs .oval-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            updateSelectedFiltersDisplay();
            updatejobFilters();
        });
    });

    // Update selected filters display
    function updateSelectedFiltersDisplay() {
        const selectedFilters = [];
        
        // education_level
        const education_level = Array.from(document.querySelectorAll('input[name="education_level"]:checked'))
            .map(cb => cb.nextElementSibling.textContent);
        if (education_level.length > 0) {
            selectedFilters.push(`Education Level: ${education_level.join(', ')}`);
        }

        // Gender
        const genders = Array.from(document.querySelectorAll('input[name="gender"]:checked'))
            .map(cb => cb.nextElementSibling.textContent);
        if (genders.length > 0) {
            selectedFilters.push(`Gender: ${genders.join(', ')}`);
        }

        // Update display
        const displayInput = document.getElementById('selected-additional-filters');
        if (selectedFilters.length > 0) {
            displayInput.value = selectedFilters.join(' | ');
            document.getElementById('toggle-additional-filters').classList.add('active');
        } else {
            displayInput.value = '';
            document.getElementById('toggle-additional-filters').classList.remove('active');
        }
    }

    // Main filter update function
    function updatejobFilters() {
        const container = document.getElementById('job-list-container');
        if (!container) {
            console.error('Job list container not found');
            return;
        }
        
        container.innerHTML = '<div class="loading-indicator">Loading...</div>';
        
        const params = new URLSearchParams(window.location.search);

        // education_level
        const education_level = Array.from(document.querySelectorAll('input[name="education_level"]:checked'))
            .map(cb => cb.value);
        if (education_level.length > 0) {
            params.set('education_level', education_level.join(','));
        } else {
            params.delete('education_level');
        }

        // Gender
        const genders = Array.from(document.querySelectorAll('input[name="gender"]:checked'))
            .map(cb => cb.value);
        if (genders.length > 0) {
            params.set('gender', genders.join(','));
        } else {
            params.delete('gender');
        }
    
        fetch(`{% url 'jobseeker_list' %}?${params.toString()}`, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.text();
        })
        .then(html => {
            container.innerHTML = html;
            window.history.replaceState(null, '', `?${params.toString()}`);
        })
        .catch(error => {
            console.error('Error:', error);
            container.innerHTML = '<div class="error-message">Error loading results. Please try again.</div>';
        });
    }

    // Initialize from URL
    function initializeFromURL() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // education_level
        const educationLevel = urlParams.get('education_level');
        if (educationLevel) {
            educationLevel.split(',').forEach(value => {
                const checkbox = document.querySelector(`input[name="education_level"][value="${value}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                }
            });
        }
        
        // Gender
        const gender = urlParams.get('gender');
        if (gender) {
            gender.split(',').forEach(value => {
                const checkbox = document.querySelector(`input[name="gender"][value="${value}"]`);
                if (checkbox) {
                    checkbox.checked = true;
                }
            });
        }
        
        updateSelectedFiltersDisplay();
    }

    // Clear button
    document.getElementById('clear-additional-filters')?.addEventListener('click', function() {
        // Clear all checkboxes
        document.querySelectorAll('.additional-filters-inputs input[type="checkbox"]').forEach(checkbox => {
            checkbox.checked = false;
        });
        
        // Update URL
        const params = new URLSearchParams(window.location.search);
        params.delete('education_level');
        params.delete('gender');
        window.history.replaceState(null, '', `?${params.toString()}`);
        
        updateSelectedFiltersDisplay();
        updatejobFilters();
    });

    // Close when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#additional-filters-container') && 
            !e.target.closest('#toggle-additional-filters')) {
            document.getElementById('additional-filters-container').style.display = 'none';
        }
    });

    function closeAllFilterContainers() {
        document.querySelectorAll('.filter-container').forEach(container => {
            container.style.display = 'none';
        });
    }

    document.addEventListener('click', function (e) {
        if (!e.target.closest('.filter-item') && !e.target.closest('.filter-container')) {
            closeAllFilterContainers();
        }
    });

    // Initialize
    initializeFromURL();
});
</script>

                history.pushState(null, '', url.toString());
                updateFilterDisplay();
            })
            .catch(err => console.error('Error:', err));
    }
});


    // Initial load
    updateFilterDisplay();
});
</script> 
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const bannerSection = document.getElementById('banner-section');
        if (!bannerSection) {
            console.error("Banner section element not found");
            return;
        }

        // Ensure the section has a height and background behavior
        bannerSection.style.backgroundSize = 'cover';
        bannerSection.style.backgroundPosition = 'center';
        bannerSection.style.backgroundRepeat = 'no-repeat';
        bannerSection.style.transition = 'background-image 0.5s ease-in-out';

        const images = [
            {% for banner in banners %}
                "{{ banner.image.url }}",
            {% endfor %}
        ];

        // Filter out empty strings (in case some URLs are missing)
        const validImages = images.filter(url => url && url.trim() !== "");
        
        if (validImages.length === 0) {
            console.warn("No banner images found. Set a fallback background.");
            bannerSection.style.backgroundColor = "#f0f2f5";  // fallback color
            return;
        }

        let currentIndex = 0;

        function changeBackground() {
            bannerSection.style.backgroundImage = `url(${validImages[currentIndex]})`;
            currentIndex = (currentIndex + 1) % validImages.length;
        }

        // Change background every 4 seconds
        setInterval(changeBackground, 4000);
        changeBackground();  // set initial image
    });
</script>
